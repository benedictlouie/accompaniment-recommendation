<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Real-Time Harmoniser</title>
<script src="https://unpkg.com/soundfont-player@0.12.0/dist/soundfont-player.min.js"></script>
<link rel="stylesheet" href="/shared.css">
<style>
  /* ── harmoniser accent: green ── */
  :root {
    --accent:       #5dcf90;
    --accent-hover: #7adfaa;
    --accent-glow:  rgba(93, 207, 144, 0.3);
    --play-text:    #0d0b09;
  }

  #app {
    width: 1200px;
    max-width: 100%;
  }

  /* ---- TOP BAR ---- */
  #top-bar {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
    margin-bottom: 10px;
    position: relative;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 12px 18px 36px; /* bottom padding for beat dots */
  }

  #bpm-display {
    font-size: 24px;
    font-weight: 700;
    color: var(--text);
    min-width: 110px;
    text-align: center;
    font-variant-numeric: tabular-nums;
  }

  #beat-dots {
    display: flex;
    gap: 14px;
    position: absolute;
    bottom: 12px;
    left: 50%;
    transform: translateX(-50%);
  }

  /* ---- INFO ROW ---- */
  #info-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-top: 8px;
    margin-bottom: 8px;
    padding: 0 4px;
  }

  .info-block { display: flex; flex-direction: column; gap: 2px; }
  .info-label { font-size: 11px; color: var(--muted); font-weight: 500; text-transform: uppercase; letter-spacing: 0.8px; }
  .info-value { font-size: 22px; font-weight: 700; font-variant-numeric: tabular-nums; }
  .note-value  { color: #5dcf90; }
  .chord-value { color: #74b8f0; }

  /* ---- LEVEL METER ---- */
  #level-area {
    padding: 0 4px;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  #level-label {
    font-size: 12px; color: var(--muted); font-weight: 500;
    min-width: 72px; text-transform: uppercase; letter-spacing: 0.8px;
  }
  #level-bar-outer {
    flex: 1;
    height: 6px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
  }
  #level-bar-inner {
    height: 100%;
    background: linear-gradient(90deg, #5dcf90, #7adfaa);
    width: 0%;
    transition: width 0.05s;
    border-radius: 6px;
  }

  /* ---- CANVAS ---- */
  #viz-canvas {
    width: 100%;
    background: #0a0806;
    border-radius: 14px;
    border: 1px solid var(--border);
    display: block;
  }

  /* ── compact overrides (keep piano.html unchanged) ── */
  #play-btn-wrap   { padding: 8px 0 4px; }
  #play-btn        { width: 60px; height: 60px; font-size: 22px; }
  #play-btn.playing { font-size: 18px; }
  #engine-selector    { margin-top: 8px; }
  #instrument-toggles { margin-top: 8px; }
  #status-bar      { margin-top: 6px; }

  /* ── MOBILE (harmoniser-specific overrides) ── */
  @media (max-width: 680px) {
    #app  { width: 100%; }

    #top-bar {
      flex-wrap: wrap; justify-content: center; gap: 10px;
      padding: 14px 14px 46px;
      border-radius: 14px;
    }
    #bpm-display { font-size: 24px; min-width: unset; }

    #info-row { padding: 0; margin-top: 12px; }
    .info-value { font-size: 22px; }

    #level-area { padding: 0; }
    #level-bar-outer { flex: 1; width: auto; }

    #viz-canvas { border-radius: 10px; }
  }
</style>
</head>
<body>

<a href="/" id="back-btn">← Home</a>

<div id="app">
  <div id="top-bar">
    <button class="tempo-btn" id="btn-minus">−</button>
    <span id="bpm-display">100 BPM</span>
    <button class="tempo-btn" id="btn-plus">+</button>
    <div id="beat-dots">
      <div class="beat-dot" data-beat="1"></div>
      <div class="beat-dot" data-beat="2"></div>
      <div class="beat-dot" data-beat="3"></div>
      <div class="beat-dot" data-beat="4"></div>
    </div>
  </div>

  <div id="info-row">
    <div class="info-block">
      <span class="info-label">Detected Note</span>
      <span class="info-value note-value" id="note-display">–</span>
    </div>
    <div class="info-block" style="text-align:right">
      <span class="info-label">Predicted Harmony</span>
      <span class="info-value chord-value" id="chord-display">–</span>
    </div>
  </div>

  <div id="level-area">
    <span id="level-label">Input Level</span>
    <div id="level-bar-outer">
      <div id="level-bar-inner"></div>
    </div>
  </div>

  <canvas id="viz-canvas" width="1200" height="200"></canvas>

  <div id="play-btn-wrap">
    <button id="play-btn" title="Start microphone">▶</button>
  </div>

  <div id="engine-selector">
    <span>Engine:</span>
    <button class="engine-btn active" data-engine="transformer">AR Transformer</button>
    <button class="engine-btn" data-engine="crf">CRF</button>
  </div>

  <div id="instrument-toggles">
    <span>Play:</span>
    <button class="toggle-btn on" data-inst="piano"    title="Toggle piano">🎹 Piano</button>
    <button class="toggle-btn on" data-inst="guitar"   title="Toggle guitar">🎸 Guitar</button>
    <button class="toggle-btn on" data-inst="bass"     title="Toggle bass">🎵 Bass</button>
    <button class="toggle-btn on" data-inst="drums"    title="Toggle drums">🥁 Drums</button>
    <button class="toggle-btn on" data-inst="metronome" title="Toggle metronome">🔔 Click</button>
  </div>

  <div id="status-bar">
    API: <span id="api-status" class="status-err">not connected</span>
  </div>
</div>

<script src="/shared.js"></script>
<script>
// =============================================================
// CONSTANTS  (harmoniser-specific; shared ones live in shared.js)
// =============================================================

// ROOTS, API_BASE, BEATS_PER_BAR, STEPS_PER_BEAT, BASE_OCTAVE, CHORD_TETRAD → shared.js
const SAMPLE_RATE_TARGET = 44100;

// mirrors Python QUALITY_SIMPLIFIER_REVERSE — probability weights per extension type
const QUALITY_SIMPLIFIER_REVERSE = {
  '7':    {none:702942,'9':8620,'11':173,'79':8693,'79b':22995,'79#':15125,'7911':26,'7911#':5400,'7913':4404,'79b13':306,'79b13b':105,'79#13':29,'79#11#':28,'7alt':5500},
  'maj7': {none:228010,'maj9':200,'maj79':685,'j79#':4,'j7911#':11846,'j79#11#':52},
  'min7': {none:526480,'min9':822,'min11':121,'min13':28,'min79':3816,'min79b':26,'min7911':5532,'min7913':64},
  'mM7':  {none:2338,'mM7911#':64,'mM7913':64},
  '6':    {none:59144,'69':3744,'6911#':6911},
  'min6': {none:22072,'min69':2913},
  'aug':  {none:5071,'aug7':9225,'aug79':144,'aug79#':424,'aug79b':60,'aug7911#':8,'augj7':250},
  'sus2': {none:179266,'power':13},
  'maj':  {none:1863597,'pedal':98},
};

// mirrors Python EXTENSION_INTERVALS — semitone offsets above root per extension type
const EXTENSION_INTERVALS = {
  none:[],
  '9':[14],'79':[14],'79b':[13],'79#':[15],
  '7911':[14,17],'7911#':[14,18],'7913':[14,21],'79b13':[14,20],'79b13b':[13,20],
  '79#13':[15,21],'79#11#':[15,18],'7alt':[13,15,18],
  'maj9':[14],'maj79':[14],'j79#':[15],'j7911#':[14,18],'j79#11#':[15,18],
  'min9':[14],'min11':[14,17],'min13':[14,17,21],'min79':[14],'min79b':[13],
  'min7911':[14,17],'min7913':[14,21],
  'mM7911#':[14,18],'mM7913':[14,21],
  '69':[14],'6911#':[14,18],'min69':[14],
  'aug7':[10],'aug79':[10,14],'aug79#':[10,15],'aug79b':[10,13],'aug7911#':[10,14,18],'augj7':[11],
  'power':[7],'pedal':[12],
  '11':[17],
};

// =============================================================
// STATE
// =============================================================

// tempo, instrumentOn → shared.js
let audioContext   = null;
let analyser       = null;
let mediaStream    = null;
let running        = false;
// tempo declared in shared.js
let currentBeat    = 1;
let lastBeatTime   = 0;    // AudioContext seconds
let predictedChord = '–';
let lastNote       = '–';
// engineType → selectedEngine in shared.js

// FIX 2: history round-trip — API is stateless, history is base64-encoded
// and must be sent back each call so the engine has context.
let beatHistory    = '';
let prevDrumLoop   = '';  // base64 drum loop round-tripped for quality fallback
let apiCallId      = 0;   // incremented each beat; stale responses are dropped

let pendingArChord = null;   // chord pre-computed by AR early-fire
let earlyApiCallId = 0;      // prevents stale early-fire responses

// Python: beat_audio_buffer fills between beat N-1 and beat N firing, then
// capture_beat_4_16ths() reads it and CLEARS it.  We mirror this with one buffer:
//   beat check happens BEFORE note capture (see loop()), so when beat N fires,
//   stepBuffer already contains only beat N-1's notes — identical to Python.
let stepBuffer = [];   // accumulates notes since last beat fired

// FIX 5: loops returned by API at bar-start are used for accompaniment
let currentLoops = null;   // { guitar, piano, bass, drums } — arrays from API
let pendingLoops = null;   // next bar's loops (mirrors piano.html pendingLoops pattern)
let prevVoicing  = { guitar: null, piano: null, bass: null };

// Soundfont players (sf, sfReady, loadSoundfonts, updateSfStatus) → shared.js

// Real-time pitch history clock — advances at 16th-note rate so pitch dots
// appear immediately (no 1-beat lag from the beat_audio_buffer approach).
let lastStepTime    = 0;   // AudioContext seconds of last history push
let pendingBeatMark = 0;   // 1=beat, 2=bar — consumed by next step push

// instrumentOn → shared.js

// Pitch history — updated once per beat (4 slots = 4×16th notes), NOT every frame.
// 120 slots ÷ 4 slots/beat = 30 beats = 7.5 bars visible at once.
const HISTORY_SLOTS = 120;
let pitchHistory = new Array(HISTORY_SLOTS).fill(null);
let historyHead  = 0;

// Beat/bar markers for vertical grid lines in the visualiser.
// barMarks[slot] = 1 → beat boundary, 2 → bar boundary (beat 1 of bar).
let barMarks = new Array(HISTORY_SLOTS).fill(0);

// =============================================================
// AUDIO SETUP
// =============================================================

// Single master gain — all synth voices route here.
// Fixes the "audio cuts out" bug: nodes disconnect via onended, preventing
// accumulation past the browser's ~6000 AudioNode limit.
let masterGain = null;

async function startMic() {
  // audioContext + masterGain are created synchronously in the click handler
  // (see below) so Chrome doesn't suspend the context after the getUserMedia await.
  try {
    mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
  } catch (e) {
    alert('Microphone access denied: ' + e.message);
    // Clean up the pre-created context since we're aborting.
    if (audioContext) { audioContext.close(); audioContext = null; }
    masterGain = null;
    return;
  }

  loadSoundfonts(SOUNDFONT_INSTRUMENTS);

  analyser = audioContext.createAnalyser();
  analyser.fftSize = 2048;

  const source = audioContext.createMediaStreamSource(mediaStream);
  source.connect(analyser);

  running = true;
  lastBeatTime  = audioContext.currentTime;
  lastStepTime  = audioContext.currentTime;
  pendingBeatMark = 0;

  const pb = document.getElementById('play-btn');
  pb.textContent = '■';
  pb.title = 'Stop';
  pb.classList.add('playing');

  resetEngineHistory();
  loop();
}

// =============================================================
// PITCH DETECTION  (autocorrelation — mirrors Python Transcriber)
// =============================================================

const timeDomainBuf = new Float32Array(2048);

function detectPitch() {
  analyser.getFloatTimeDomainData(timeDomainBuf);

  // RMS amplitude
  let rms = 0;
  for (let i = 0; i < timeDomainBuf.length; i++) rms += timeDomainBuf[i] ** 2;
  rms = Math.sqrt(rms / timeDomainBuf.length);

  updateLevelMeter(rms);

  if (rms < 0.008) return 'quiet';

  // Autocorrelation
  const SIZE = timeDomainBuf.length;
  let d = 0;
  while (d < SIZE - 1 && timeDomainBuf[d] * timeDomainBuf[d + 1] >= 0) d++;

  let maxVal = -Infinity, maxLag = -1;
  for (let lag = d; lag < SIZE / 2; lag++) {
    let sum = 0;
    for (let i = 0; i < SIZE - lag; i++) sum += timeDomainBuf[i] * timeDomainBuf[i + lag];
    if (sum > maxVal) { maxVal = sum; maxLag = lag; }
  }

  if (maxLag < 1) return 'no pitch';

  const freq = audioContext.sampleRate / maxLag;
  if (freq < 60 || freq > 2000) return 'no pitch';

  return freqToNoteName(freq);
}

function freqToNoteName(freq) {
  const midi = Math.round(69 + 12 * Math.log2(freq / 440));
  if (midi < 36 || midi > 96) return 'no pitch';  // C2–C7
  const octave = Math.floor(midi / 12) - 1;
  const name   = ROOTS[midi % 12];
  return `${name}${octave}`;
}

// noteNameToMidi() → shared.js

// =============================================================
// LEVEL METER
// =============================================================

function updateLevelMeter(rms) {
  const pct = Math.min(100, rms * 600);
  document.getElementById('level-bar-inner').style.width = pct + '%';
}

// =============================================================
// SOUNDFONT INSTRUMENTS
// =============================================================

const SOUNDFONT_INSTRUMENTS = {
  piano:  'acoustic_grand_piano',
  guitar: 'acoustic_guitar_steel',
  bass:   'electric_bass_finger',
};

// loadSoundfonts(), updateSfStatus(), sfPlay() → shared.js

// =============================================================
// BEAT TIMING  (mirrors Python harmoniser main loop)
// =============================================================

function loop() {
  if (!running) return;
  requestAnimationFrame(loop);

  // Re-wake the AudioContext if the browser suspended it (Chrome power management).
  // When suspended, currentTime freezes so the beat check never fires and all
  // audio goes silent while rAF and the visualiser keep running normally.
  if (audioContext.state === 'suspended') audioContext.resume();

  const now          = audioContext.currentTime;
  const beatDuration = 60 / tempo;
  const stepDuration = beatDuration / STEPS_PER_BEAT;

  // ----------------------------------------------------------
  // DRIFT GUARD — if the audio clock is more than 2 beats ahead of
  // our beat-scheduler (tab was backgrounded, rAF throttled, etc.),
  // beatStart would be in the past and Web Audio silently drops every
  // event scheduled there, killing the metronome and instruments.
  // Reset both clocks to "now" so the next beat fires cleanly.
  // ----------------------------------------------------------
  if (now - lastBeatTime > beatDuration * 2) {
    lastBeatTime    = now;
    lastStepTime    = now;
    stepBuffer      = [];
    pendingBeatMark = 0;
    prevVoicing     = { guitar: null, piano: null, bass: null };  // voice leading restarts fresh after gap
  }

  // ----------------------------------------------------------
  // BEAT CHECK FIRST — at this moment stepBuffer holds all the
  // notes captured since the previous beat fired, i.e. beat N-1's
  // audio.  This mirrors Python's beat_audio_buffer which fills
  // between beats and is read+cleared by capture_beat_4_16ths().
  // ----------------------------------------------------------
  if (now - lastBeatTime >= beatDuration) {
    const beatStart = lastBeatTime;
    lastBeatTime += beatDuration;
    const beatFireMs = performance.now();

    // Python: prev_beat_start = beat_start - engine.beat_duration
    // Python: prev_beat       = (current_beat - 2) % BEATS_PER_BAR + 1
    const prevBeatStart = beatStart - beatDuration;
    const prevBeat      = ((currentBeat - 2) % BEATS_PER_BAR + BEATS_PER_BAR) % BEATS_PER_BAR + 1;
    console.log(`[BEAT] beat=${prevBeat}`);

    // Quantise stepBuffer to 4 16th-note slots — mirrors capture_beat_4_16ths()
    const n = stepBuffer.length;
    const steps = n >= 4
      ? [0,1,2,3].map(i => stepBuffer[Math.round(i * (n - 1) / 3)])
      : Array(4).fill('quiet');

    // Clear for next beat — mirrors beat_audio_buffer = []
    stepBuffer = [];

    const processedNotes = [];
    steps.forEach((step, i) => {
      if (step !== 'quiet' && step !== 'no pitch') {
        processedNotes.push({
          note:  step,
          start: prevBeatStart + i * stepDuration,
          end:   prevBeatStart + (i + 1) * stepDuration,
        });
      }
    });

    if (selectedEngine === 'transformer') {
      // Apply early-predicted chord before playLoopBeat uses predictedChord
      if (pendingArChord !== null) {
        predictedChord = pendingArChord;
        document.getElementById('chord-display').textContent = pendingArChord;
        pendingArChord = null;
      }
      // Update history without logging chord (early fire already handled that)
      if (processedNotes.length > 0) {
        predictChordFromAPI(processedNotes, prevBeatStart, prevBeat, beatFireMs, true);
      }
      // Schedule early fire for the next beat from the actual beat time
      const _nextBeatTime = beatStart + beatDuration;
      const _nextBeat     = currentBeat;   // before advance = what next beat's prevBeat will be
      const earlyDelay    = Math.max(0, (beatDuration - LATENCY_COMPENSATION * stepDuration) * 1000);
      setTimeout(() => {
        if (selectedEngine === 'transformer' && running) {
          predictChordEarlyAR(_nextBeat, _nextBeatTime, beatDuration, performance.now());
        }
      }, earlyDelay);
    } else {
      if (processedNotes.length > 0) {
        predictChordFromAPI(processedNotes, prevBeatStart, prevBeat, beatFireMs);
      }
    }

    // 0-indexed position within the bar: beat 1 → 0, beat 2 → 1, …, beat 4 → 3.
    // Matches piano.html where (beatIndex-1)*STEPS_PER_BEAT maps beat 1 to steps 0-3.
    const beatInBar = (currentBeat - 1) % BEATS_PER_BAR;

    // Promote pending loops at beat 1 (beatInBar === 0), matching piano.html.
    if (beatInBar === 0) {
      if (pendingLoops) {
        currentLoops = pendingLoops;
        prevVoicing  = { guitar: null, piano: null, bass: null };
        pendingLoops = null;
      }
    }

    // CRF chord display updates at bar start (beat 1), independent of loop promotion.
    if (currentBeat === 1 && selectedEngine === 'crf' && crfPendingChord) {
      document.getElementById('chord-display').textContent = crfPendingChord;
      crfPendingChord = '';
    }

    // Schedule click at the exact beat time (beatStart), not at the rAF time (now).
    // This matches piano.html which schedules audio events against the audio clock.
    if (instrumentOn.metronome) {
      playMetronomeClick(beatStart, currentBeat === 1);  // strong on beat 1
    }

    if (currentLoops && predictedChord !== '–' && predictedChord !== 'N') {
      playLoopBeat(predictedChord, currentLoops, beatInBar, now);
    }

    // ---- VISUALISER: mark beat/bar boundary for the real-time step clock ----
    // pitchHistory is NOT pushed here any more — the step clock below pushes
    // one slot per 16th note using the live detected pitch (zero lag).
    // pendingBeatMark is consumed by the very next step-clock tick.
    const isBarStart = (currentBeat === 1);  // bar boundary stays on beat 1
    pendingBeatMark = isBarStart ? 2 : 1;

    // Dot update fires at the precise beat time via setTimeout — mirrors piano.html's
    //   setTimeout(() => onBeat(beat, …), msUntil)
    // which decouples visual timing from rAF jitter (up to 16 ms late at 60 fps).
    // beatStart is the ideal beat time; msUntil ≤ 0 because rAF fires reactively
    // (after the beat has passed), so Math.max(0,…) schedules it on the very next
    // event-loop tick — far sooner than the next rAF frame.
    const msUntil = (beatStart - audioContext.currentTime) * 1000;
    const _dotBeat = currentBeat;
    setTimeout(() => updateBeatDots(_dotBeat), Math.max(0, msUntil));

    currentBeat = currentBeat % BEATS_PER_BAR + 1;
  }

  // ----------------------------------------------------------
  // CAPTURE NOTE AFTER BEAT CHECK — goes into the fresh buffer
  // for the beat that just started (mirrors Python's audio callback
  // filling beat_audio_buffer after capture_beat_4_16ths cleared it).
  // ----------------------------------------------------------
  const note = detectPitch();
  stepBuffer.push(note);

  if (note !== 'quiet' && note !== 'no pitch') {
    lastNote = note;
    document.getElementById('note-display').textContent = note;
  }

  // ---- Real-time pitch history clock (16th-note rate) ----
  // Advances one slot per stepDuration using live pitch — no beat-buffer lag.
  // pendingBeatMark from the beat handler marks the first slot of each beat/bar.
  while (now - lastStepTime >= stepDuration) {
    lastStepTime += stepDuration;
    barMarks[historyHead]    = pendingBeatMark;
    pendingBeatMark          = 0;   // consumed
    pitchHistory[historyHead] = (note !== 'quiet' && note !== 'no pitch') ? note : null;
    historyHead = (historyHead + 1) % HISTORY_SLOTS;
  }

  drawVisualiser();
}

// =============================================================
// CHORD PREDICTION  (stateless API — history round-tripped as base64)
// =============================================================

async function predictChordEarlyAR(beat, beatTime, beatDur, beatFireMs) {
  const callId = ++earlyApiCallId;
  try {
    const fetchStart = performance.now();
    const res = await fetch(`${API_BASE}/predict-chord`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        notes: [],
        beat_start:           beatTime - beatDur,
        beat_index:           beat,
        tempo,
        engine:               'transformer',
        history:              beatHistory,
        prev_drum_loop:       prevDrumLoop,
        early_fire:           true,
        latency_compensation: LATENCY_COMPENSATION,
      }),
    });
    const data = await res.json();
    const serverMs = (performance.now() - fetchStart).toFixed(0);
    const totalMs  = (performance.now() - beatFireMs).toFixed(0);

    if (callId !== earlyApiCallId) return;

    if (data.chord) {
      pendingArChord = data.chord;
      predictedChord = data.chord;
      document.getElementById('chord-display').textContent = data.chord;
      console.log(`[CHORD] beat=${beat}  chord=${data.chord}  total=${totalMs}ms  server=${serverMs}ms`);
    }
  } catch (e) {}
}

async function predictChordFromAPI(notes, beatStart, beatIndex, beatFireMs = performance.now(), historyOnly = false) {
  const callId = ++apiCallId;
  try {
    const body = {
      notes,
      beat_start:     beatStart,
      beat_index:     beatIndex,
      tempo,
      engine:         selectedEngine,
      history:        beatHistory,
      prev_drum_loop: prevDrumLoop,
    };
    if (selectedEngine === 'crf') {
      body.crf_delta        = crfDelta;
      body.crf_bar_history  = crfBarHistory;
      body.crf_bar_pitch    = crfBarPitch;
      body.crf_beat_count   = crfBeatCount;
      body.crf_loop_history = crfLoopHistory;
    }
    const fetchStartMs = performance.now();
    const res  = await fetch(`${API_BASE}/predict-chord`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    const data = await res.json();
    const serverMs = (performance.now() - fetchStartMs).toFixed(0);
    const preMs    = (fetchStartMs - beatFireMs).toFixed(0);

    if (data.loops && Object.keys(data.loops).length > 0) {
      pendingLoops = data.loops;
    }
    if (data.prev_drum_loop) prevDrumLoop = data.prev_drum_loop;

    // Discard chord/history if a newer beat has already updated state.
    if (callId !== apiCallId) return;

    if (selectedEngine === 'crf') {
      crfDelta       = data.crf_delta        ?? crfDelta;
      crfBarHistory  = data.crf_bar_history  ?? crfBarHistory;
      crfBarPitch    = data.crf_bar_pitch    ?? crfBarPitch;
      crfBeatCount   = data.crf_beat_count   ?? crfBeatCount;
      crfLoopHistory = data.crf_loop_history ?? crfLoopHistory;
      if (data.chord) {
        predictedChord  = data.chord;  // audio: immediate
        crfPendingChord = data.chord;
        document.getElementById('chord-display').textContent = data.chord;
        console.log(`[CHORD/CRF] beat=${beatIndex}  chord=${data.chord}  total=${(performance.now()-beatFireMs).toFixed(0)}ms  (pre-fetch=${preMs}ms  server=${serverMs}ms)`);
      }
    } else {
      if (data.history) beatHistory = data.history;
      if (!historyOnly && data.chord) {
        predictedChord = data.chord;
        console.log(`[CHORD] beat=${beatIndex}  chord=${data.chord}  total=${(performance.now()-beatFireMs).toFixed(0)}ms  (pre-fetch=${preMs}ms  server=${serverMs}ms)`);
        document.getElementById('chord-display').textContent = data.chord;
      }
    }
  } catch (e) {}
}

// =============================================================
// ACCOMPANIMENT  (mirrors Python AccompanimentSystem.play_beat +
//                 HarmonyPlayer.play_harmony_nn)
// =============================================================

// Snap a target MIDI note to the closest note in `chord` (±1 octave)
// mirrors Python HarmonyPlayer.snap_to_chord
// pitchRange = [lo, hi] keeps each instrument in its own register (Python behaviour).
// Falls back to unrestricted search if nothing lands in range.
function snapToChord(target, chord, pitchRange) {
  const [lo, hi] = pitchRange ?? [0, 127];
  let best = null, bestDist = Infinity;
  for (const octave of [-12, 0, 12]) {
    const pool = (octave === -12) ? chord.slice(0, 4) : chord;
    for (const n of pool) {
      const candidate = n + octave;
      if (candidate < lo || candidate > hi) continue;
      const d = Math.abs(candidate - target);
      if (d < bestDist) { bestDist = d; best = candidate; }
    }
  }
  if (best === null) return snapToChord(target, chord);
  return best;
}

// Per-instrument voice ranges (mirrors Python HarmonyPlayer.VOICE_RANGES)
const VOICE_RANGES = {
  guitar: [40, 67],
  piano:  [48, 84],
  bass:   [28, 52],
};

// mirrors Python HarmonyPlayer.extend_chord — randomly adds extensions (9th/11th/13th)
// to enrich the piano voicing. Uses QUALITY_SIMPLIFIER_REVERSE probability weights.
function extendChord(chordName) {
  const base = CHORD_TETRAD[chordName];
  if (!base || chordName === 'N') return base ? base.slice() : [];
  const quality = chordName.split(':')[1];
  const probs   = QUALITY_SIMPLIFIER_REVERSE[quality];
  if (!probs) return base.slice();

  // weighted random choice — mirrors Python random.choices(weights=...)
  const keys    = Object.keys(probs);
  const weights = keys.map(k => probs[k]);
  const total   = weights.reduce((a, b) => a + b, 0);
  let r = Math.random() * total;
  let ext = keys[keys.length - 1];
  for (let i = 0; i < keys.length; i++) {
    r -= weights[i];
    if (r <= 0) { ext = keys[i]; break; }
  }

  const chord = base.slice();
  const root  = chord[0];
  (EXTENSION_INTERVALS[ext] || []).forEach(iv => chord.push(root + iv));
  return chord;
}

// mirrors Python HarmonyPlayer.voice_lead — exhaustive itertools.product search for
// the globally-optimal voicing (minimum total semitone displacement from prev).
// Rejects voicings with unisons (two voices on the same pitch).
function voiceLead(prevNotes, chordPcs, lo, hi) {
  const candidates = chordPcs.map(pc => {
    const opts = [];
    for (let o = -1; o < 9; o++) {
      const cand = pc + 12 * o;
      if (cand >= lo && cand <= hi) opts.push(cand);
    }
    return opts;
  });

  if (candidates.some(c => c.length === 0)) return chordPcs.map(pc => pc + 48);

  const n          = chordPcs.length;
  const prevSorted = prevNotes.slice(0, n).sort((a, b) => a - b);
  let best = null, bestCost = Infinity;

  // recursive product — equivalent to itertools.product(*candidates)
  function search(depth, current) {
    if (depth === n) {
      const voicing = current.slice().sort((a, b) => a - b);
      for (let i = 0; i < voicing.length - 1; i++) {
        if (voicing[i + 1] - voicing[i] < 1) return;   // reject unisons
      }
      const cost = voicing.reduce((acc, v, i) => acc + Math.abs(v - prevSorted[i]), 0);
      if (cost < bestCost) { bestCost = cost; best = voicing; }
      return;
    }
    for (const cand of candidates[depth]) {
      current.push(cand);
      search(depth + 1, current);
      current.pop();
    }
  }
  search(0, []);

  return best ?? candidates.map(c => c[0]).sort((a, b) => a - b);
}

// mirrors Python HarmonyPlayer — builds a voiced chord for an instrument.
// Piano: extend_chord + +12 shift. Bass: -12 shift. Guitar: base tetrad.
// Voice leading (voiceLead) applied when prev voicing exists; otherwise clamp to range.
function buildVoicedChord(chordName, instrument) {
  if (!CHORD_TETRAD[chordName]) return null;

  // Piano uses extended chord (7ths/9ths added randomly); bass/guitar use base tetrad.
  let chord;
  if (instrument === 'piano') {
    chord = extendChord(chordName).map(n => n + 12);
  } else {
    chord = CHORD_TETRAD[chordName].slice();
    if (instrument === 'bass') chord = chord.map(n => n - 12);
  }

  const [lo, hi] = VOICE_RANGES[instrument];
  const prev     = prevVoicing[instrument];

  if (prev) {
    const chordPcs = chord.map(n => n % 12);
    chord = voiceLead(prev, chordPcs, lo, hi);
  } else {
    chord = chord.map(n => {
      while (n < lo) n += 12;
      while (n > hi) n -= 12;
      return n;
    }).sort((a, b) => a - b);
  }

  prevVoicing[instrument] = chord;
  return chord;
}

// Play one beat's worth of loop steps for a single instrument via Web Audio
// mirrors Python HarmonyPlayer.play_harmony_nn
function playInstrumentBeat(chordName, loop, beatInBar, instrument, startTime) {
  if (!audioContext || !loop) return;

  const chord = buildVoicedChord(chordName, instrument);
  if (!chord) return;

  const beatDuration = 60 / tempo;
  const stepDuration = beatDuration / STEPS_PER_BEAT;
  const startStep    = beatInBar * STEPS_PER_BEAT;

  for (let sub = 0; sub < STEPS_PER_BEAT; sub++) {
    const step = startStep + sub;
    if (step >= loop.length) break;

    const stepStart = startTime + sub * stepDuration;
    const notesNow  = new Set();

    for (const interval of loop[step]) {
      if (interval < 0) continue;                        // -1 = silence
      const target = chord[0] + interval;
      const midi   = snapToChord(target, chord, VOICE_RANGES[instrument]);
      if (midi !== null) notesNow.add(midi);
    }

    // Use soundfont if loaded; fall back to Web Audio oscillator while loading
    const sfDur  = stepDuration * { guitar: 1.8, piano: 1.4, bass: 2.2 }[instrument];
    const sfGain = { guitar: 1.4, piano: 1.2, bass: 1.8 }[instrument];
    notesNow.forEach(midi => {
      if (sf[instrument]) sfPlay(instrument, midi, stepStart, sfDur, sfGain);
      else                playNote(midi, instrument, stepStart, stepDuration);
    });
  }
}

// Play all harmonic instruments + drums for the current beat
// mirrors Python AccompanimentSystem.play_beat (symphony mode)
function playLoopBeat(chordName, loops, beatInBar, startTime) {
  for (const instrument of ['guitar', 'piano', 'bass']) {
    if (instrumentOn[instrument]) {
      playInstrumentBeat(chordName, loops[instrument], beatInBar, instrument, startTime);
    }
  }
  if (instrumentOn.drums && loops.drums) {
    playDrumsBeat(loops.drums, beatInBar, startTime);
  }
}

// Synthesise a single MIDI note via Web Audio with instrument-appropriate timbre.
// Routes through masterGain; onended disconnects nodes to prevent the node-leak
// that causes audio to cut out after a few minutes.
function playNote(midi, instrument, startTime, duration) {
  if (!audioContext || !masterGain) return;
  const pt   = Math.max(audioContext.currentTime + 0.003, startTime);
  const freq = 440 * Math.pow(2, (midi - 69) / 12);

  const osc  = audioContext.createOscillator();
  const filt = audioContext.createBiquadFilter();
  const gain = audioContext.createGain();

  filt.type = 'lowpass';

  if (instrument === 'guitar') {
    osc.type             = 'sawtooth';
    filt.frequency.value = 2500;
  } else if (instrument === 'piano') {
    osc.type             = 'triangle';
    filt.frequency.value = 3500;
  } else {            // bass
    osc.type             = 'sine';
    filt.frequency.value = 500;
  }

  osc.frequency.value = freq;
  osc.connect(filt);
  filt.connect(gain);
  gain.connect(masterGain);

  const vel = { guitar: 0.36, piano: 0.22, bass: 0.55 }[instrument];
  gain.gain.setValueAtTime(0, pt);
  gain.gain.linearRampToValueAtTime(vel, pt + 0.012);
  gain.gain.setValueAtTime(vel, pt + duration * 0.65);
  gain.gain.linearRampToValueAtTime(0, pt + duration);

  osc.start(pt);
  osc.stop(pt + duration + 0.05);
  osc.onended = () => { osc.disconnect(); filt.disconnect(); gain.disconnect(); };
}

// =============================================================
// DRUMS  (General MIDI drum map — synthesised via Web Audio)
// =============================================================

// GM drum note → synth type
// drums loop: [16, 128] uint8 — velocity per MIDI note per step (0 = silent)
const DRUM_GROUPS = {
  kick:   [35, 36],
  snare:  [38, 40],
  hihatC: [42, 44],
  hihatO: [46],
  clap:   [39],
  tomH:   [50, 48],
  tomL:   [45, 43, 41],
  crash:  [49, 57],
  ride:   [51, 53, 59],
};

function midiToDrumGroup(midi) {
  for (const [group, notes] of Object.entries(DRUM_GROUPS)) {
    if (notes.includes(midi)) return group;
  }
  return null;
}

// Helper: create noise buffer source routed through masterGain, auto-disconnects on end.
function _noiseNode(duration, filtType, filtFreq, filtQ, gainVal, t) {
  const pt   = Math.max(audioContext.currentTime + 0.003, t);
  const bufLen = Math.floor(audioContext.sampleRate * duration);
  const buf    = audioContext.createBuffer(1, bufLen, audioContext.sampleRate);
  const data   = buf.getChannelData(0);
  for (let i = 0; i < bufLen; i++) data[i] = Math.random() * 2 - 1;
  const src  = audioContext.createBufferSource();
  const filt = audioContext.createBiquadFilter();
  const gain = audioContext.createGain();
  src.buffer = buf;
  filt.type  = filtType; filt.frequency.value = filtFreq;
  if (filtQ !== undefined) filt.Q.value = filtQ;
  src.connect(filt); filt.connect(gain); gain.connect(masterGain);
  gain.gain.setValueAtTime(gainVal, pt);
  gain.gain.exponentialRampToValueAtTime(0.001, pt + duration);
  src.start(pt); src.stop(pt + duration + 0.01);
  src.onended = () => { src.disconnect(); filt.disconnect(); gain.disconnect(); };
  return src;
}

function playDrumNote(group, velocity, t) {
  if (!audioContext || !masterGain) return;
  const vel = (velocity / 127) * 0.9;
  const pt  = Math.max(audioContext.currentTime + 0.003, t);

  if (group === 'kick') {
    const osc  = audioContext.createOscillator();
    const gain = audioContext.createGain();
    osc.connect(gain); gain.connect(masterGain);
    osc.frequency.setValueAtTime(160, pt);
    osc.frequency.exponentialRampToValueAtTime(40, pt + 0.08);
    gain.gain.setValueAtTime(vel * 1.0, pt);
    gain.gain.exponentialRampToValueAtTime(0.001, pt + 0.25);
    osc.start(pt); osc.stop(pt + 0.3);
    osc.onended = () => { osc.disconnect(); gain.disconnect(); };

  } else if (group === 'snare') {
    _noiseNode(0.15, 'bandpass', 3000, 0.5, vel * 0.6, pt);
    const osc2 = audioContext.createOscillator();
    const g2   = audioContext.createGain();
    osc2.connect(g2); g2.connect(masterGain);
    osc2.frequency.value = 200;
    g2.gain.setValueAtTime(vel * 0.3, pt);
    g2.gain.exponentialRampToValueAtTime(0.001, pt + 0.08);
    osc2.start(pt); osc2.stop(pt + 0.1);
    osc2.onended = () => { osc2.disconnect(); g2.disconnect(); };

  } else if (group === 'hihatC') {
    _noiseNode(0.04, 'highpass', 8000, undefined, vel * 0.25, pt);

  } else if (group === 'hihatO') {
    _noiseNode(0.25, 'highpass', 6000, undefined, vel * 0.25, pt);

  } else if (group === 'clap') {
    for (let k = 0; k < 2; k++) {
      _noiseNode(0.06, 'bandpass', 1200, 0.7, vel * 0.45, pt + k * 0.01);
    }

  } else if (group === 'tomH' || group === 'tomL') {
    const freq = group === 'tomH' ? 200 : 100;
    const osc  = audioContext.createOscillator();
    const gain = audioContext.createGain();
    osc.connect(gain); gain.connect(masterGain);
    osc.frequency.setValueAtTime(freq * 1.5, pt);
    osc.frequency.exponentialRampToValueAtTime(freq, pt + 0.06);
    gain.gain.setValueAtTime(vel * 0.5, pt);
    gain.gain.exponentialRampToValueAtTime(0.001, pt + 0.18);
    osc.start(pt); osc.stop(pt + 0.2);
    osc.onended = () => { osc.disconnect(); gain.disconnect(); };

  } else if (group === 'crash') {
    _noiseNode(0.6, 'highpass', 5000, undefined, vel * 0.3, pt);

  } else if (group === 'ride') {
    _noiseNode(0.2, 'bandpass', 4000, 1, vel * 0.2, pt);
  }
}

// Play one beat worth of drum steps (beatInBar 0-3 → steps 0-3, 4-7, 8-11, 12-15)
function playDrumsBeat(drumLoop, beatInBar, startTime) {
  if (!audioContext || !drumLoop) return;
  const beatDuration = 60 / tempo;
  const stepDuration = beatDuration / STEPS_PER_BEAT;
  const startStep    = beatInBar * STEPS_PER_BEAT;

  for (let sub = 0; sub < STEPS_PER_BEAT; sub++) {
    const step = startStep + sub;
    if (step >= drumLoop.length) break;
    const stepStart = startTime + sub * stepDuration;
    const velocities = drumLoop[step]; // array of 128 velocity values

    // LPD dataset stores binary velocity (0 or 1), not 0–127.
    // Python hardcodes note_on(9, n, 127) — we must do the same or drums are silent.
    const groupHit = new Set();
    velocities.forEach((vel, midi) => {
      if (vel === 0) return;
      const group = midiToDrumGroup(midi);
      if (group) groupHit.add(group);
    });

    groupHit.forEach(group => playDrumNote(group, 127, stepStart));
  }
}

// =============================================================
// METRONOME CLICK (synthesised)
// =============================================================

function playMetronomeClick(t, strong) {
  if (!audioContext || !masterGain) return;
  const pt   = Math.max(audioContext.currentTime + 0.003, t);
  const osc  = audioContext.createOscillator();
  const gain = audioContext.createGain();
  osc.connect(gain); gain.connect(masterGain);
  osc.frequency.value = strong ? 1200 : 800;
  gain.gain.setValueAtTime(0.2, pt);
  gain.gain.exponentialRampToValueAtTime(0.001, pt + 0.04);
  osc.start(pt); osc.stop(pt + 0.05);
  osc.onended = () => { osc.disconnect(); gain.disconnect(); };
}

// =============================================================
// VISUALISER  (scrolling pitch display, mirrors TranscriberVisualiser)
// =============================================================

const canvas = document.getElementById('viz-canvas');
const ctx2d  = canvas.getContext('2d');

function resizeCanvas() {
  const cssW = canvas.clientWidth || 1200;
  const ratio = cssW / 1200;
  canvas.width  = 1200;
  canvas.height = Math.round(200 * Math.max(0.4, ratio));
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

const VIZ_MIDI_LOW  = 36;  // C2  (MIDI 36 = C2 in this system where C4=60, A4=69)
const VIZ_MIDI_HIGH = 96;  // C7

function noteToY(note) {
  const midi = noteNameToMidi(note);
  if (midi < 0) return -1;
  const t = (midi - VIZ_MIDI_LOW) / (VIZ_MIDI_HIGH - VIZ_MIDI_LOW);
  return canvas.height * (1 - t);
}

function drawVisualiser() {
  const W = canvas.width, H = canvas.height;
  ctx2d.fillStyle = '#0a0806';
  ctx2d.fillRect(0, 0, W, H);

  const slotW = W / HISTORY_SLOTS;

  // ---- Vertical beat / bar grid lines ----
  // barMarks[slot]: 1 = beat boundary, 2 = bar boundary
  // Oldest slot is at index historyHead; display column i ↔ slot (historyHead+i)%HISTORY_SLOTS
  ctx2d.setLineDash([]);
  for (let i = 0; i < HISTORY_SLOTS; i++) {
    const slot   = (historyHead + i) % HISTORY_SLOTS;
    const mark   = barMarks[slot];
    if (!mark) continue;
    const x = i * slotW;
    ctx2d.strokeStyle = mark === 2 ? '#2e2e2e' : '#1c1c1c';
    ctx2d.lineWidth   = mark === 2 ? 1.5 : 1;
    ctx2d.beginPath(); ctx2d.moveTo(x, 0); ctx2d.lineTo(x, H); ctx2d.stroke();
  }

  // ---- Horizontal pitch grid lines (C notes, C2–C7) ----
  ctx2d.lineWidth = 1;
  for (let midi = VIZ_MIDI_LOW; midi <= VIZ_MIDI_HIGH; midi++) {
    if (midi % 12 !== 0) continue;   // only C notes
    const y = noteToY(freqToNoteName(440 * Math.pow(2, (midi - 69) / 12)));
    ctx2d.strokeStyle = '#1e1e1e';
    ctx2d.beginPath(); ctx2d.moveTo(0, y); ctx2d.lineTo(W, y); ctx2d.stroke();
    const octave = Math.floor(midi / 12) - 1;
    ctx2d.fillStyle = '#363636';
    ctx2d.font = '10px Arial';
    ctx2d.fillText(`C${octave}`, 4, y - 3);
  }

  // ---- Pitch history dots ----
  for (let i = 0; i < HISTORY_SLOTS; i++) {
    const idx  = (historyHead + i) % HISTORY_SLOTS;
    const note = pitchHistory[idx];
    if (!note) continue;
    const x   = i * slotW + slotW / 2;
    const y   = noteToY(note);
    if (y < 0 || y > H) continue;
    const age = i / (HISTORY_SLOTS - 1);   // 0 = oldest, 1 = newest
    ctx2d.fillStyle = `rgba(93, 207, 144, ${0.2 + age * 0.8})`;
    ctx2d.beginPath();
    ctx2d.arc(x, y, 3.5, 0, Math.PI * 2);
    ctx2d.fill();
  }

}

// updateBeatDots() → shared.js

// =============================================================
// TEMPO CONTROLS
// =============================================================

// setTempo(), btn-plus/minus listeners → shared.js
function stopMic() {
  // Stop the rAF loop
  running = false;

  // Kill the microphone tracks so the browser mic indicator disappears
  if (mediaStream) {
    mediaStream.getTracks().forEach(t => t.stop());
    mediaStream = null;
  }

  // Close the AudioContext
  if (audioContext) {
    audioContext.close();
    audioContext = null;
  }
  analyser   = null;
  masterGain = null;

  // Unload soundfont players
  sf.piano = null; sf.guitar = null; sf.bass = null;
  sfReady  = 0;

  // Reset playback state (keep tempo)
  currentLoops   = null;
  pendingLoops   = null;
  prevVoicing    = { guitar: null, piano: null, bass: null };
  stepBuffer     = [];
  beatHistory    = '';
  prevDrumLoop   = '';
  apiCallId      = 0;
  earlyApiCallId = 0;
  pendingArChord = null;
  predictedChord = '–';
  lastNote       = '–';
  currentBeat    = 1;
  lastBeatTime   = 0;
  pitchHistory    = new Array(HISTORY_SLOTS).fill(null);
  barMarks        = new Array(HISTORY_SLOTS).fill(0);
  historyHead     = 0;
  lastStepTime    = 0;
  pendingBeatMark = 0;

  document.getElementById('chord-display').textContent = '–';
  document.getElementById('note-display').textContent  = '–';
  document.getElementById('level-bar-inner').style.width = '0%';
  document.querySelectorAll('.beat-dot').forEach(d => d.classList.remove('active'));

  // Clear the visualiser canvas
  const W = canvas.width, H = canvas.height;
  ctx2d.fillStyle = '#0e0e0e';
  ctx2d.fillRect(0, 0, W, H);

  // Reset button
  const pb = document.getElementById('play-btn');
  pb.textContent = '▶';
  pb.title       = 'Start microphone';
  pb.classList.remove('playing');

  // Tell the server to forget its state too
  fetch(`${API_BASE}/reset`, { method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ app: 'harmoniser', engine_type: selectedEngine }) }).catch(() => {});
}

document.getElementById('play-btn').addEventListener('click', () => {
  if (!document.getElementById('play-btn').classList.contains('playing')) {
    // Create AudioContext HERE, synchronously inside the click handler, so Chrome's
    // user-gesture token is still active. After the getUserMedia await inside startMic()
    // the token expires and any AudioContext created there starts suspended — currentTime
    // freezes at 0, the beat check never fires, and nothing plays.
    try {
      audioContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: SAMPLE_RATE_TARGET });
    } catch (_) {
      audioContext = new (window.AudioContext || window.webkitAudioContext)();
    }
    masterGain = audioContext.createGain();
    masterGain.gain.value = 1.0;
    masterGain.connect(audioContext.destination);
    startMic();
  } else {
    stopMic();
  }
});

// =============================================================
// API HEALTH CHECK
// =============================================================

async function checkAPI() {
  const el = document.getElementById('api-status');
  try {
    const res = await fetch(`${API_BASE}/health`);
    const d   = await res.json();
    if (d.status === 'ok') {
      if (running) {
        updateSfStatus();
      } else {
        el.textContent = 'connected';
        el.className   = 'status-ok';
      }
    } else {
      el.textContent = 'not connected (chord prediction unavailable)';
      el.className   = 'status-err';
    }
  } catch (e) {
    el.textContent = 'not connected (chord prediction unavailable)';
    el.className   = 'status-err';
  }
}

// FIX 6: reset ALL local state, not just the server-side history
async function resetEngineHistory() {
  beatHistory    = '';
  resetCRFState();
  prevDrumLoop   = '';
  currentLoops   = null;
  pendingLoops   = null;
  prevVoicing    = { guitar: null, piano: null, bass: null };
  stepBuffer     = [];
  pendingArChord = null;
  try {
    const res = await fetch(`${API_BASE}/reset`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ app: 'harmoniser', engine_type: selectedEngine })
    });
    const d = await res.json();
    if (d.history !== undefined) beatHistory = d.history;
  } catch (e) {}
}

onEngineSwitch = stopMic;

checkAPI();
setInterval(checkAPI, 5000);
