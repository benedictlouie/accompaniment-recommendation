<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Real-Time Harmoniser</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #141414;
    color: #f0f0f0;
    font-family: Arial, sans-serif;
    user-select: none;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
    min-height: 100vh;
  }

  #app {
    width: 1200px;
    max-width: 100%;
  }

  /* ---- TOP BAR ---- */
  #top-bar {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
    margin-bottom: 20px;
    position: relative;
  }

  .tempo-btn {
    background: #5AAEFF;
    border: none;
    color: #f0f0f0;
    font-size: 22px;
    font-weight: bold;
    width: 40px;
    height: 40px;
    border-radius: 8px;
    cursor: pointer;
  }
  .tempo-btn:hover { background: #78bbff; }

  #bpm-display {
    font-size: 32px;
    font-weight: bold;
    color: #f0f0f0;
    min-width: 130px;
    text-align: center;
  }

  #beat-dots {
    display: flex;
    gap: 16px;
    position: absolute;
    bottom: -28px;
    left: 50%;
    transform: translateX(-50%);
  }
  .beat-dot {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: #787878;
    transition: background 0.05s;
  }
  .beat-dot.active { background: #ff5a5a; }

  /* ---- INFO ROW ---- */
  #info-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-top: 40px;
    margin-bottom: 16px;
    padding: 0 20px;
  }

  .info-block { display: flex; flex-direction: column; gap: 4px; }
  .info-label { font-size: 14px; color: #787878; }
  .info-value { font-size: 26px; font-weight: bold; }
  .note-value  { color: #50DC8C; }
  .chord-value { color: #5AAEFF; }

  /* ---- LEVEL METER ---- */
  #level-area {
    padding: 0 20px;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  #level-label { font-size: 13px; color: #787878; min-width: 80px; }
  #level-bar-outer {
    width: 200px;
    height: 18px;
    border: 2px solid #f0f0f0;
    border-radius: 3px;
    overflow: hidden;
  }
  #level-bar-inner {
    height: 100%;
    background: #50DC8C;
    width: 0%;
    transition: width 0.05s;
  }

  /* ---- CANVAS ---- */
  #viz-canvas {
    width: 100%;
    background: #0e0e0e;
    border-radius: 8px;
    display: block;
  }

  /* ---- CIRCULAR PLAY / STOP BUTTON ---- */
  #play-btn-wrap {
    display: flex; justify-content: center; align-items: center;
    padding: 18px 0 6px;
  }
  #play-btn {
    width: 76px; height: 76px; border-radius: 50%;
    background: #50DC8C; border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 28px; color: #141414;
    box-shadow: 0 0 32px rgba(80,220,140,.4);
    transition: background .15s, box-shadow .15s, font-size .2s;
  }
  #play-btn:hover { background: #6feaa5; }
  #play-btn.playing {
    background: #ff5a5a; color: #fff;
    box-shadow: 0 0 20px rgba(255,90,90,.35);
    font-size: 22px;
  }
  #play-btn.playing:hover { background: #ff7a7a; }

  /* ---- STATUS ---- */
  #status-bar {
    margin-top: 10px;
    font-size: 13px;
    color: #787878;
    text-align: center;
  }
  .status-ok  { color: #50DC8C; }
  .status-err { color: #ff5a5a; }

  #engine-selector {
    display: flex;
    gap: 8px;
    margin-top: 10px;
    justify-content: center;
    align-items: center;
  }
  #engine-selector span { font-size: 13px; color: #787878; }
  .engine-btn {
    background: #282C34;
    border: 2px solid #444;
    color: #aaa;
    font-size: 13px;
    padding: 5px 14px;
    border-radius: 6px;
    cursor: pointer;
  }
  .engine-btn.active { border-color: #5AAEFF; color: #5AAEFF; background: #1a2535; }
  .engine-btn:hover  { border-color: #5AAEFF; }

  /* ---- INSTRUMENT TOGGLES ---- */
  #instrument-toggles {
    display: flex;
    gap: 8px;
    margin-top: 12px;
    justify-content: center;
    align-items: center;
    flex-wrap: wrap;
  }
  #instrument-toggles span { font-size: 13px; color: #787878; }
  .toggle-btn {
    background: #282C34;
    border: 2px solid #444;
    color: #aaa;
    font-size: 13px;
    padding: 5px 14px;
    border-radius: 6px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: border-color .15s, color .15s, background .15s;
  }
  .toggle-btn .toggle-icon { font-size: 15px; }
  .toggle-btn.on  { border-color: #50DC8C; color: #50DC8C; background: #112518; }
  .toggle-btn.off { border-color: #444;    color: #555;    background: #1e1e1e; }
  .toggle-btn:hover { border-color: #6feaa5; }
  .toggle-btn[data-inst="metronome"].on  { border-color: #f0c040; color: #f0c040; background: #1f1a00; }
  .toggle-btn[data-inst="metronome"]:hover { border-color: #f5d060; }

  @media (max-width: 680px) {
    #instrument-toggles { gap: 6px; }
    .toggle-btn { font-size: 12px; padding: 4px 10px; }
  }

  #back-btn {
    position: fixed; top: 16px; left: 20px; z-index: 200;
    color: #787878; text-decoration: none; font-size: 13px;
    display: flex; align-items: center; gap: 6px;
    transition: color .15s;
  }
  #back-btn:hover { color: #5AAEFF; }

  /* ── MOBILE ── */
  @media (max-width: 680px) {
    body { padding: 10px; }
    #app  { width: 100%; }

    #top-bar {
      flex-wrap: wrap; justify-content: center; gap: 10px;
      padding-bottom: 44px;   /* room for absolute beat-dots */
    }
    #bpm-display { font-size: 24px; min-width: unset; }
    .tempo-btn   { width: 36px; height: 36px; font-size: 18px; }
    .beat-dot    { width: 16px; height: 16px; }

    #info-row { padding: 0 8px; margin-top: 44px; }
    .info-value { font-size: 20px; }

    #level-area { padding: 0 8px; }
    #level-bar-outer { flex: 1; width: auto; }

    #play-btn { width: 64px; height: 64px; font-size: 24px; }

    #engine-selector { flex-wrap: wrap; }
    .engine-btn { font-size: 12px; padding: 4px 10px; }
  }
</style>
</head>
<body>

<a href="/" id="back-btn">← Home</a>

<div id="app">
  <div id="top-bar">
    <button class="tempo-btn" id="btn-minus">−</button>
    <span id="bpm-display">100 BPM</span>
    <button class="tempo-btn" id="btn-plus">+</button>
    <div id="beat-dots">
      <div class="beat-dot" data-beat="1"></div>
      <div class="beat-dot" data-beat="2"></div>
      <div class="beat-dot" data-beat="3"></div>
      <div class="beat-dot" data-beat="4"></div>
    </div>
  </div>

  <div id="info-row">
    <div class="info-block">
      <span class="info-label">Detected Note</span>
      <span class="info-value note-value" id="note-display">–</span>
    </div>
    <div class="info-block" style="text-align:right">
      <span class="info-label">Predicted Harmony</span>
      <span class="info-value chord-value" id="chord-display">–</span>
    </div>
  </div>

  <div id="level-area">
    <span id="level-label">Input Level</span>
    <div id="level-bar-outer">
      <div id="level-bar-inner"></div>
    </div>
  </div>

  <canvas id="viz-canvas" width="1200" height="420"></canvas>

  <div id="play-btn-wrap">
    <button id="play-btn" title="Start microphone">▶</button>
  </div>

  <div id="engine-selector">
    <span>Engine:</span>
    <button class="engine-btn active" data-engine="transformer">AR Transformer</button>
  </div>

  <div id="instrument-toggles">
    <span>Play:</span>
    <button class="toggle-btn on" data-inst="piano"    title="Toggle piano">🎹 Piano</button>
    <button class="toggle-btn on" data-inst="guitar"   title="Toggle guitar">🎸 Guitar</button>
    <button class="toggle-btn on" data-inst="bass"     title="Toggle bass">🎵 Bass</button>
    <button class="toggle-btn on" data-inst="drums"    title="Toggle drums">🥁 Drums</button>
    <button class="toggle-btn on" data-inst="metronome" title="Toggle metronome">🔔 Click</button>
  </div>

  <div id="status-bar">
    API: <span id="api-status" class="status-err">not connected</span>
  </div>
</div>

<script>
// =============================================================
// CONSTANTS  (mirrors Python utils/constants.py)
// =============================================================

const ROOTS = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const SAMPLE_RATE_TARGET = 44100;
const API_BASE = '/api';
const BEATS_PER_BAR  = 4;
const STEPS_PER_BEAT = 4;   // MELODY_NOTES_PER_BEAT
const BASE_OCTAVE    = 36;  // C2 — matches Python CHORD_TO_TETRAD

// Build CHORD_TETRAD (mirrors Python CHORD_TO_TETRAD for maj/min)
const CHORD_TETRAD = { N: [-1,-1,-1,-1] };
ROOTS.forEach((r, i) => {
  const root = BASE_OCTAVE + i;
  CHORD_TETRAD[`${r}:maj`] = [root, root+4, root+7, root+12];
  CHORD_TETRAD[`${r}:min`] = [root, root+3, root+7, root+12];
});

// =============================================================
// STATE
// =============================================================

let audioContext   = null;
let analyser       = null;
let mediaStream    = null;
let running        = false;
let tempo          = 100;
let currentBeat    = 1;
let lastBeatTime   = 0;    // AudioContext seconds
let predictedChord = '–';
let lastNote       = '–';
let engineType     = 'transformer';  // FIX 1: was undefined, crashed resetEngineHistory

// FIX 2: history round-trip — API is stateless, history is base64-encoded
// and must be sent back each call so the engine has context.
let beatHistory = '';

// Python: beat_audio_buffer fills between beat N-1 and beat N firing, then
// capture_beat_4_16ths() reads it and CLEARS it.  We mirror this with one buffer:
//   beat check happens BEFORE note capture (see loop()), so when beat N fires,
//   stepBuffer already contains only beat N-1's notes — identical to Python.
let stepBuffer = [];   // accumulates notes since last beat fired

// FIX 5: loops returned by API at bar-start are used for accompaniment
let currentLoops = null;   // { guitar, piano, bass, drums } — arrays from API
let prevVoicing  = { guitar: null, piano: null, bass: null };

// ---- INSTRUMENT TOGGLES ----
const instrumentOn = { piano: true, guitar: true, bass: true, drums: true, metronome: true };

// Pitch history for visualiser
const HISTORY_SLOTS = 120;
let pitchHistory = new Array(HISTORY_SLOTS).fill(null);
let historyHead  = 0;

// =============================================================
// AUDIO SETUP
// =============================================================

async function startMic() {
  try {
    mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
  } catch (e) {
    alert('Microphone access denied: ' + e.message);
    return;
  }

  audioContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: SAMPLE_RATE_TARGET });

  analyser = audioContext.createAnalyser();
  analyser.fftSize = 2048;

  const source = audioContext.createMediaStreamSource(mediaStream);
  source.connect(analyser);

  running = true;
  lastBeatTime = audioContext.currentTime;

  const pb = document.getElementById('play-btn');
  pb.textContent = '■';
  pb.title = 'Stop';
  pb.classList.add('playing');

  resetEngineHistory();
  loop();
}

// =============================================================
// PITCH DETECTION  (autocorrelation — mirrors Python Transcriber)
// =============================================================

const timeDomainBuf = new Float32Array(2048);

function detectPitch() {
  analyser.getFloatTimeDomainData(timeDomainBuf);

  // RMS amplitude
  let rms = 0;
  for (let i = 0; i < timeDomainBuf.length; i++) rms += timeDomainBuf[i] ** 2;
  rms = Math.sqrt(rms / timeDomainBuf.length);

  updateLevelMeter(rms);

  if (rms < 0.008) return 'quiet';

  // Autocorrelation
  const SIZE = timeDomainBuf.length;
  let d = 0;
  while (d < SIZE - 1 && timeDomainBuf[d] * timeDomainBuf[d + 1] >= 0) d++;

  let maxVal = -Infinity, maxLag = -1;
  for (let lag = d; lag < SIZE / 2; lag++) {
    let sum = 0;
    for (let i = 0; i < SIZE - lag; i++) sum += timeDomainBuf[i] * timeDomainBuf[i + lag];
    if (sum > maxVal) { maxVal = sum; maxLag = lag; }
  }

  if (maxLag < 1) return 'no pitch';

  const freq = audioContext.sampleRate / maxLag;
  if (freq < 60 || freq > 2000) return 'no pitch';

  return freqToNoteName(freq);
}

function freqToNoteName(freq) {
  const midi = Math.round(69 + 12 * Math.log2(freq / 440));
  if (midi < 24 || midi > 96) return 'no pitch';
  const octave = Math.floor(midi / 12) - 1;
  const name   = ROOTS[midi % 12];
  return `${name}${octave}`;
}

function noteNameToMidi(name) {
  const root   = name.slice(0, -1);
  const octave = parseInt(name.slice(-1));
  const idx    = ROOTS.indexOf(root);
  return idx >= 0 ? (octave + 1) * 12 + idx : -1;
}

// =============================================================
// LEVEL METER
// =============================================================

function updateLevelMeter(rms) {
  const pct = Math.min(100, rms * 600);
  document.getElementById('level-bar-inner').style.width = pct + '%';
}

// =============================================================
// BEAT TIMING  (mirrors Python harmoniser main loop)
// =============================================================

function loop() {
  if (!running) return;
  requestAnimationFrame(loop);

  const now          = audioContext.currentTime;
  const beatDuration = 60 / tempo;
  const stepDuration = beatDuration / STEPS_PER_BEAT;

  // ----------------------------------------------------------
  // BEAT CHECK FIRST — at this moment stepBuffer holds all the
  // notes captured since the previous beat fired, i.e. beat N-1's
  // audio.  This mirrors Python's beat_audio_buffer which fills
  // between beats and is read+cleared by capture_beat_4_16ths().
  // ----------------------------------------------------------
  if (now - lastBeatTime >= beatDuration) {
    const beatStart = lastBeatTime;
    lastBeatTime += beatDuration;

    // Python: prev_beat_start = beat_start - engine.beat_duration
    // Python: prev_beat       = (current_beat - 2) % BEATS_PER_BAR + 1
    const prevBeatStart = beatStart - beatDuration;
    const prevBeat      = ((currentBeat - 2) % BEATS_PER_BAR + BEATS_PER_BAR) % BEATS_PER_BAR + 1;

    // Quantise stepBuffer to 4 16th-note slots — mirrors capture_beat_4_16ths()
    const n = stepBuffer.length;
    const steps = n >= 4
      ? [0,1,2,3].map(i => stepBuffer[Math.round(i * (n - 1) / 3)])
      : Array(4).fill('quiet');

    // Clear for next beat — mirrors beat_audio_buffer = []
    stepBuffer = [];

    const processedNotes = [];
    steps.forEach((step, i) => {
      if (step !== 'quiet' && step !== 'no pitch') {
        processedNotes.push({
          note:  step,
          start: prevBeatStart + i * stepDuration,
          end:   prevBeatStart + (i + 1) * stepDuration,
        });
      }
    });

    predictChordFromAPI(processedNotes, prevBeatStart, prevBeat);

    if (currentLoops && predictedChord !== '–' && predictedChord !== 'N') {
      const beatInBar = (currentBeat - 1) % BEATS_PER_BAR;
      playLoopBeat(predictedChord, currentLoops, beatInBar, now);
    }

    if (instrumentOn.metronome) {
      playMetronomeClick(now, currentBeat === 1);
    }

    updateBeatDots(currentBeat);
    currentBeat = currentBeat % BEATS_PER_BAR + 1;
  }

  // ----------------------------------------------------------
  // CAPTURE NOTE AFTER BEAT CHECK — goes into the fresh buffer
  // for the beat that just started (mirrors Python's audio callback
  // filling beat_audio_buffer after capture_beat_4_16ths cleared it).
  // ----------------------------------------------------------
  const note = detectPitch();
  stepBuffer.push(note);

  if (note !== 'quiet' && note !== 'no pitch') {
    lastNote = note;
    document.getElementById('note-display').textContent = note;
  }
  pitchHistory[historyHead] = (note === 'quiet' || note === 'no pitch') ? null : note;
  historyHead = (historyHead + 1) % HISTORY_SLOTS;

  drawVisualiser();
}

// =============================================================
// CHORD PREDICTION  (stateless API — history round-tripped as base64)
// =============================================================

async function predictChordFromAPI(notes, beatStart, beatIndex) {
  try {
    const res = await fetch(`${API_BASE}/predict-chord`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        notes,
        beat_start: beatStart,
        beat_index: beatIndex,
        tempo,
        history: beatHistory,   // FIX 2: round-trip history so API stays stateful
      })
    });
    const data = await res.json();

    if (data.chord) {
      predictedChord = data.chord;
      document.getElementById('chord-display').textContent = data.chord;
    }
    if (data.history) {
      beatHistory = data.history;   // FIX 2: store updated history for next call
    }
    // FIX 5: API returns loops only on beat_index 1 (bar start)
    if (data.loops && Object.keys(data.loops).length > 0) {
      currentLoops = data.loops;
      prevVoicing  = { guitar: null, piano: null, bass: null };  // reset voice leading
    }
  } catch (e) {}
}

// =============================================================
// ACCOMPANIMENT  (mirrors Python AccompanimentSystem.play_beat +
//                 HarmonyPlayer.play_harmony_nn)
// =============================================================

// Snap a target MIDI note to the closest note in `chord` (±1 octave)
// mirrors Python HarmonyPlayer.snap_to_chord
function snapToChord(target, chord) {
  let best = null, bestDist = Infinity;
  for (const octave of [-12, 0, 12]) {
    const pool = (octave === -12) ? chord.slice(0, 4) : chord;
    for (const n of pool) {
      const candidate = n + octave;
      const d = Math.abs(candidate - target);
      if (d < bestDist) { bestDist = d; best = candidate; }
    }
  }
  return best;
}

// Per-instrument voice ranges (mirrors Python HarmonyPlayer.VOICE_RANGES)
const VOICE_RANGES = {
  guitar: [40, 67],
  piano:  [48, 84],
  bass:   [28, 52],
};

// Build voiced chord for an instrument, applying simple closest-octave voice leading
function buildVoicedChord(chordName, instrument) {
  const base = CHORD_TETRAD[chordName];
  if (!base) return null;
  let chord = base.slice();

  // Piano plays an octave higher (mirrors Python play_harmony_nn piano branch)
  if (instrument === 'piano') chord = chord.map(n => n + 12);

  const [lo, hi] = VOICE_RANGES[instrument];
  const prev     = prevVoicing[instrument];

  if (prev) {
    // Voice leading: for each pitch class keep the octave closest to prev voicing
    const pcs = chord.map(n => n % 12);
    chord = pcs.map((pc, i) => {
      const target = prev[i] ?? (lo + hi) / 2;
      let best = pc + 48, bestDist = Infinity;
      for (let o = -1; o < 9; o++) {
        const cand = pc + 12 * o;
        if (cand < lo || cand > hi) continue;
        const d = Math.abs(cand - target);
        if (d < bestDist) { bestDist = d; best = cand; }
      }
      return best;
    }).sort((a, b) => a - b);
  } else {
    // First voicing: clamp to instrument range
    chord = chord.map(n => {
      while (n < lo) n += 12;
      while (n > hi) n -= 12;
      return n;
    }).sort((a, b) => a - b);
  }

  prevVoicing[instrument] = chord;
  return chord;
}

// Play one beat's worth of loop steps for a single instrument via Web Audio
// mirrors Python HarmonyPlayer.play_harmony_nn
function playInstrumentBeat(chordName, loop, beatInBar, instrument, startTime) {
  if (!audioContext || !loop) return;

  const chord = buildVoicedChord(chordName, instrument);
  if (!chord) return;

  const beatDuration = 60 / tempo;
  const stepDuration = beatDuration / STEPS_PER_BEAT;
  const startStep    = beatInBar * STEPS_PER_BEAT;

  for (let sub = 0; sub < STEPS_PER_BEAT; sub++) {
    const step = startStep + sub;
    if (step >= loop.length) break;

    const stepStart = startTime + sub * stepDuration;
    const notesNow  = new Set();

    for (const interval of loop[step]) {
      if (interval < 0) continue;                        // -1 = silence
      const target = chord[0] + interval;
      const midi   = snapToChord(target, chord);
      if (midi !== null) notesNow.add(midi);
    }

    notesNow.forEach(midi => playNote(midi, instrument, stepStart, stepDuration));
  }
}

// Play all harmonic instruments + drums for the current beat
// mirrors Python AccompanimentSystem.play_beat (symphony mode)
function playLoopBeat(chordName, loops, beatInBar, startTime) {
  for (const instrument of ['guitar', 'piano', 'bass']) {
    if (instrumentOn[instrument]) {
      playInstrumentBeat(chordName, loops[instrument], beatInBar, instrument, startTime);
    }
  }
  if (instrumentOn.drums && loops.drums) {
    playDrumsBeat(loops.drums, beatInBar, startTime);
  }
}

// Synthesise a single MIDI note via Web Audio with instrument-appropriate timbre
function playNote(midi, instrument, startTime, duration) {
  if (!audioContext) return;
  const freq = 440 * Math.pow(2, (midi - 69) / 12);

  const osc  = audioContext.createOscillator();
  const filt = audioContext.createBiquadFilter();
  const gain = audioContext.createGain();

  filt.type = 'lowpass';

  if (instrument === 'guitar') {
    osc.type           = 'sawtooth';
    filt.frequency.value = 2500;
  } else if (instrument === 'piano') {
    osc.type           = 'triangle';
    filt.frequency.value = 3500;
  } else {            // bass
    osc.type           = 'sine';
    filt.frequency.value = 500;
  }

  osc.frequency.value = freq;
  osc.connect(filt);
  filt.connect(gain);
  gain.connect(audioContext.destination);

  const vel = { guitar: 0.18, piano: 0.10, bass: 0.28 }[instrument];
  gain.gain.setValueAtTime(0, startTime);
  gain.gain.linearRampToValueAtTime(vel, startTime + 0.012);
  gain.gain.setValueAtTime(vel, startTime + duration * 0.65);
  gain.gain.linearRampToValueAtTime(0, startTime + duration);

  osc.start(startTime);
  osc.stop(startTime + duration + 0.05);
}

// =============================================================
// DRUMS  (General MIDI drum map — synthesised via Web Audio)
// =============================================================

// GM drum note → synth type
// drums loop: [16, 128] uint8 — velocity per MIDI note per step (0 = silent)
const DRUM_GROUPS = {
  kick:   [35, 36],
  snare:  [38, 40],
  hihatC: [42, 44],
  hihatO: [46],
  clap:   [39],
  tomH:   [50, 48],
  tomL:   [45, 43, 41],
  crash:  [49, 57],
  ride:   [51, 53, 59],
};

function midiToDrumGroup(midi) {
  for (const [group, notes] of Object.entries(DRUM_GROUPS)) {
    if (notes.includes(midi)) return group;
  }
  return null;
}

function playDrumNote(group, velocity, t) {
  if (!audioContext) return;
  const vel = (velocity / 127) * 0.9;

  if (group === 'kick') {
    // Sine with fast pitch sweep down
    const osc  = audioContext.createOscillator();
    const gain = audioContext.createGain();
    osc.connect(gain); gain.connect(audioContext.destination);
    osc.frequency.setValueAtTime(160, t);
    osc.frequency.exponentialRampToValueAtTime(40, t + 0.08);
    gain.gain.setValueAtTime(vel * 1.0, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.25);
    osc.start(t); osc.stop(t + 0.3);

  } else if (group === 'snare') {
    // Noise burst + pitched tone
    const bufLen = Math.floor(audioContext.sampleRate * 0.15);
    const buf    = audioContext.createBuffer(1, bufLen, audioContext.sampleRate);
    const data   = buf.getChannelData(0);
    for (let i = 0; i < bufLen; i++) data[i] = Math.random() * 2 - 1;

    const src  = audioContext.createBufferSource();
    const filt = audioContext.createBiquadFilter();
    const gain = audioContext.createGain();
    src.buffer = buf;
    filt.type  = 'bandpass'; filt.frequency.value = 3000; filt.Q.value = 0.5;
    src.connect(filt); filt.connect(gain); gain.connect(audioContext.destination);
    gain.gain.setValueAtTime(vel * 0.6, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
    src.start(t); src.stop(t + 0.2);

    // Tonal body
    const osc2 = audioContext.createOscillator();
    const g2   = audioContext.createGain();
    osc2.connect(g2); g2.connect(audioContext.destination);
    osc2.frequency.value = 200;
    g2.gain.setValueAtTime(vel * 0.3, t);
    g2.gain.exponentialRampToValueAtTime(0.001, t + 0.08);
    osc2.start(t); osc2.stop(t + 0.1);

  } else if (group === 'hihatC') {
    // Short filtered noise
    const bufLen = Math.floor(audioContext.sampleRate * 0.04);
    const buf    = audioContext.createBuffer(1, bufLen, audioContext.sampleRate);
    const data   = buf.getChannelData(0);
    for (let i = 0; i < bufLen; i++) data[i] = Math.random() * 2 - 1;

    const src  = audioContext.createBufferSource();
    const filt = audioContext.createBiquadFilter();
    const gain = audioContext.createGain();
    src.buffer = buf;
    filt.type  = 'highpass'; filt.frequency.value = 8000;
    src.connect(filt); filt.connect(gain); gain.connect(audioContext.destination);
    gain.gain.setValueAtTime(vel * 0.25, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.04);
    src.start(t); src.stop(t + 0.06);

  } else if (group === 'hihatO') {
    // Longer filtered noise
    const bufLen = Math.floor(audioContext.sampleRate * 0.25);
    const buf    = audioContext.createBuffer(1, bufLen, audioContext.sampleRate);
    const data   = buf.getChannelData(0);
    for (let i = 0; i < bufLen; i++) data[i] = Math.random() * 2 - 1;

    const src  = audioContext.createBufferSource();
    const filt = audioContext.createBiquadFilter();
    const gain = audioContext.createGain();
    src.buffer = buf;
    filt.type  = 'highpass'; filt.frequency.value = 6000;
    src.connect(filt); filt.connect(gain); gain.connect(audioContext.destination);
    gain.gain.setValueAtTime(vel * 0.25, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.25);
    src.start(t); src.stop(t + 0.3);

  } else if (group === 'clap') {
    // Two quick noise bursts
    for (let k = 0; k < 2; k++) {
      const offset = k * 0.01;
      const bufLen = Math.floor(audioContext.sampleRate * 0.05);
      const buf    = audioContext.createBuffer(1, bufLen, audioContext.sampleRate);
      const data   = buf.getChannelData(0);
      for (let i = 0; i < bufLen; i++) data[i] = Math.random() * 2 - 1;
      const src  = audioContext.createBufferSource();
      const filt = audioContext.createBiquadFilter();
      const gain = audioContext.createGain();
      src.buffer = buf;
      filt.type  = 'bandpass'; filt.frequency.value = 1200; filt.Q.value = 0.7;
      src.connect(filt); filt.connect(gain); gain.connect(audioContext.destination);
      gain.gain.setValueAtTime(vel * 0.45, t + offset);
      gain.gain.exponentialRampToValueAtTime(0.001, t + offset + 0.06);
      src.start(t + offset); src.stop(t + offset + 0.08);
    }

  } else if (group === 'tomH' || group === 'tomL') {
    const freq = group === 'tomH' ? 200 : 100;
    const osc  = audioContext.createOscillator();
    const gain = audioContext.createGain();
    osc.connect(gain); gain.connect(audioContext.destination);
    osc.frequency.setValueAtTime(freq * 1.5, t);
    osc.frequency.exponentialRampToValueAtTime(freq, t + 0.06);
    gain.gain.setValueAtTime(vel * 0.5, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.18);
    osc.start(t); osc.stop(t + 0.2);

  } else if (group === 'crash') {
    const bufLen = Math.floor(audioContext.sampleRate * 0.6);
    const buf    = audioContext.createBuffer(1, bufLen, audioContext.sampleRate);
    const data   = buf.getChannelData(0);
    for (let i = 0; i < bufLen; i++) data[i] = Math.random() * 2 - 1;
    const src  = audioContext.createBufferSource();
    const filt = audioContext.createBiquadFilter();
    const gain = audioContext.createGain();
    src.buffer = buf;
    filt.type  = 'highpass'; filt.frequency.value = 5000;
    src.connect(filt); filt.connect(gain); gain.connect(audioContext.destination);
    gain.gain.setValueAtTime(vel * 0.3, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.6);
    src.start(t); src.stop(t + 0.65);

  } else if (group === 'ride') {
    const bufLen = Math.floor(audioContext.sampleRate * 0.2);
    const buf    = audioContext.createBuffer(1, bufLen, audioContext.sampleRate);
    const data   = buf.getChannelData(0);
    for (let i = 0; i < bufLen; i++) data[i] = Math.random() * 2 - 1;
    const src  = audioContext.createBufferSource();
    const filt = audioContext.createBiquadFilter();
    const gain = audioContext.createGain();
    src.buffer = buf;
    filt.type  = 'bandpass'; filt.frequency.value = 4000; filt.Q.value = 1;
    src.connect(filt); filt.connect(gain); gain.connect(audioContext.destination);
    gain.gain.setValueAtTime(vel * 0.2, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
    src.start(t); src.stop(t + 0.25);
  }
}

// Play one beat worth of drum steps (beatInBar 0-3 → steps 0-3, 4-7, 8-11, 12-15)
function playDrumsBeat(drumLoop, beatInBar, startTime) {
  if (!audioContext || !drumLoop) return;
  const beatDuration = 60 / tempo;
  const stepDuration = beatDuration / STEPS_PER_BEAT;
  const startStep    = beatInBar * STEPS_PER_BEAT;

  for (let sub = 0; sub < STEPS_PER_BEAT; sub++) {
    const step = startStep + sub;
    if (step >= drumLoop.length) break;
    const stepStart = startTime + sub * stepDuration;
    const velocities = drumLoop[step]; // array of 128 velocity values

    // Deduplicate drum groups per step (loudest velocity wins)
    const groupBest = {};
    velocities.forEach((vel, midi) => {
      if (vel === 0) return;
      const group = midiToDrumGroup(midi);
      if (!group) return;
      if (!groupBest[group] || vel > groupBest[group]) groupBest[group] = vel;
    });

    for (const [group, vel] of Object.entries(groupBest)) {
      playDrumNote(group, vel, stepStart);
    }
  }
}

// =============================================================
// METRONOME CLICK (synthesised)
// =============================================================

function playMetronomeClick(t, strong) {
  if (!audioContext) return;
  const osc  = audioContext.createOscillator();
  const gain = audioContext.createGain();
  osc.connect(gain); gain.connect(audioContext.destination);
  osc.frequency.value = strong ? 1200 : 800;
  gain.gain.setValueAtTime(0.2, t);
  gain.gain.exponentialRampToValueAtTime(0.001, t + 0.04);
  osc.start(t); osc.stop(t + 0.05);
}

// =============================================================
// VISUALISER  (scrolling pitch display, mirrors TranscriberVisualiser)
// =============================================================

const canvas = document.getElementById('viz-canvas');
const ctx2d  = canvas.getContext('2d');

function resizeCanvas() {
  const cssW = canvas.clientWidth || 1200;
  const ratio = cssW / 1200;
  canvas.width  = 1200;
  canvas.height = Math.round(420 * Math.max(0.4, ratio));
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

const VIZ_MIDI_LOW  = 48;  // C3
const VIZ_MIDI_HIGH = 84;  // C6

function noteToY(note) {
  const midi = noteNameToMidi(note);
  if (midi < 0) return -1;
  const t = (midi - VIZ_MIDI_LOW) / (VIZ_MIDI_HIGH - VIZ_MIDI_LOW);
  return canvas.height * (1 - t);
}

function drawVisualiser() {
  const W = canvas.width, H = canvas.height;
  ctx2d.fillStyle = '#0e0e0e';
  ctx2d.fillRect(0, 0, W, H);

  // Horizontal grid lines (C notes)
  ctx2d.strokeStyle = '#1e1e1e';
  ctx2d.lineWidth = 1;
  for (let midi = VIZ_MIDI_LOW; midi <= VIZ_MIDI_HIGH; midi++) {
    if (midi % 12 === 0) {
      const y = noteToY(freqToNoteName(440 * Math.pow(2, (midi - 69) / 12)));
      ctx2d.beginPath(); ctx2d.moveTo(0, y); ctx2d.lineTo(W, y); ctx2d.stroke();
      const name = ROOTS[midi % 12] + (Math.floor(midi / 12) - 1);
      ctx2d.fillStyle = '#333';
      ctx2d.font = '11px Arial';
      ctx2d.fillText(name, 4, y - 3);
    }
  }

  // Draw pitch history as dots
  const slotW = W / HISTORY_SLOTS;
  for (let i = 0; i < HISTORY_SLOTS; i++) {
    const idx  = (historyHead + i) % HISTORY_SLOTS;
    const note = pitchHistory[idx];
    if (!note) continue;
    const x = i * slotW + slotW / 2;
    const y = noteToY(note);
    if (y < 0) continue;
    const age = 1 - i / HISTORY_SLOTS;
    ctx2d.fillStyle = `rgba(80, 220, 140, ${0.3 + age * 0.7})`;
    ctx2d.beginPath();
    ctx2d.arc(x, y, 4, 0, Math.PI * 2);
    ctx2d.fill();
  }

  // Vertical beat progress line
  const beatPct = Math.min(1, (audioContext ? (audioContext.currentTime - lastBeatTime) / (60 / tempo) : 0));
  ctx2d.strokeStyle = '#5AAEFF';
  ctx2d.lineWidth = 2;
  ctx2d.setLineDash([4, 4]);
  ctx2d.beginPath();
  ctx2d.moveTo(W - (1 - beatPct) * slotW * 4, 0);
  ctx2d.lineTo(W - (1 - beatPct) * slotW * 4, H);
  ctx2d.stroke();
  ctx2d.setLineDash([]);

  // Chord label overlay
  if (predictedChord !== '–') {
    ctx2d.font = 'bold 18px Arial';
    ctx2d.fillStyle = '#5AAEFF';
    ctx2d.fillText(predictedChord, W - 100, 24);
  }
}

// =============================================================
// BEAT DOTS
// =============================================================

function updateBeatDots(beat) {
  document.querySelectorAll('.beat-dot').forEach(dot => {
    dot.classList.toggle('active', parseInt(dot.dataset.beat) === beat);
  });
}

// =============================================================
// TEMPO CONTROLS
// =============================================================

function setTempo(bpm) {
  tempo = Math.max(20, Math.min(300, bpm));
  document.getElementById('bpm-display').textContent = `${tempo} BPM`;
}

document.getElementById('btn-plus' ).addEventListener('click', () => setTempo(tempo + 5));
document.getElementById('btn-minus').addEventListener('click', () => setTempo(tempo - 5));
document.getElementById('play-btn').addEventListener('click', () => {
  if (!document.getElementById('play-btn').classList.contains('playing')) {
    startMic();
  } else {
    location.reload();
  }
});

// =============================================================
// API HEALTH CHECK
// =============================================================

async function checkAPI() {
  try {
    const res = await fetch(`${API_BASE}/health`);
    const d   = await res.json();
    const ok  = d.status === 'ok';
    const el  = document.getElementById('api-status');
    el.textContent = ok ? 'connected' : 'not connected (chord prediction unavailable)';
    el.className   = ok ? 'status-ok' : 'status-err';
  } catch (e) {
    const el = document.getElementById('api-status');
    el.textContent = 'not connected (chord prediction unavailable)';
    el.className   = 'status-err';
  }
}

// FIX 6: reset ALL local state, not just the server-side history
async function resetEngineHistory() {
  beatHistory  = '';
  currentLoops = null;
  prevVoicing  = { guitar: null, piano: null, bass: null };
  stepBuffer = [];
  try {
    const res = await fetch(`${API_BASE}/reset`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ app: 'harmoniser', engine_type: engineType })
    });
    const d = await res.json();
    if (d.history !== undefined) beatHistory = d.history;
  } catch (e) {}
}


// =============================================================
// INSTRUMENT TOGGLE BUTTONS
// =============================================================

document.querySelectorAll('.toggle-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const inst = btn.dataset.inst;
    instrumentOn[inst] = !instrumentOn[inst];
    btn.classList.toggle('on',  instrumentOn[inst]);
    btn.classList.toggle('off', !instrumentOn[inst]);
  });
});

checkAPI();
setInterval(checkAPI, 5000);
</script>
