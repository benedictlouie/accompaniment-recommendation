<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Real-time Piano Accompaniment</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #141414;
    color: #f0f0f0;
    font-family: Arial, sans-serif;
    user-select: none;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
    min-height: 100vh;
  }

  #app {
    width: 1100px;
    max-width: 100%;
  }

  /* ---- TOP BAR ---- */
  #top-bar {
    background: #282C34;
    height: 100px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    border-radius: 8px 8px 0 0;
    position: relative;
  }

  /* Metronome (left+center) */
  #metronome-area {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    flex: 1;
  }

  #tempo-row {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .tempo-btn {
    background: #5AAEFF;
    border: none;
    color: #f0f0f0;
    font-size: 22px;
    font-weight: bold;
    width: 40px;
    height: 40px;
    border-radius: 8px;
    cursor: pointer;
    line-height: 1;
  }
  .tempo-btn:hover { background: #78bbff; }

  #bpm-display {
    font-size: 28px;
    font-weight: bold;
    color: #f0f0f0;
    min-width: 120px;
    text-align: center;
  }

  #beat-dots {
    display: flex;
    gap: 16px;
  }

  .beat-dot {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: #787878;
    transition: background 0.05s;
  }
  .beat-dot.active { background: #ff5a5a; }

  #range-label {
    display: block;
    text-align: center;
    font-size: 12px;
    color: #aaa;
    margin-top: 6px;
  }

  /* Chord display (right) */
  #chord-area {
    min-width: 180px;
    text-align: right;
  }
  #chord-label { font-size: 13px; color: #787878; }
  #chord-display {
    font-size: 24px;
    font-weight: bold;
    color: #5AAEFF;
    margin-top: 4px;
  }

  /* ---- PIANO ---- */
  #piano-container {
    position: relative;
    width: 100%;
    height: 280px;
    background: #141414;
    border-radius: 0 0 8px 8px;
    overflow: hidden;
  }

  #piano {
    position: relative;
    width: 100%;
    height: 100%;
    display: flex;
  }

  .white-key {
    flex: 1;
    background: #f0f0f0;
    border: 2px solid #141414;
    border-top: none;
    border-radius: 0 0 6px 6px;
    cursor: pointer;
    position: relative;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    padding-bottom: 8px;
    transition: background 0.04s;
  }
  .white-key:hover { background: #d8eeff; }
  .white-key.active { background: #5AAEFF !important; }

  .white-key .key-label {
    font-size: 12px;
    color: #333;
    pointer-events: none;
  }
  .white-key.active .key-label { color: #141414; }

  .black-key {
    position: absolute;
    top: 0;
    height: 60%;
    width: calc(100% / 14 * 0.58);
    background: #141414;
    border-radius: 0 0 5px 5px;
    cursor: pointer;
    z-index: 2;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    padding-bottom: 6px;
    transition: background 0.04s;
  }
  .black-key:hover { background: #2a2a2a; }
  .black-key.active { background: #5AAEFF !important; }

  .black-key .key-label {
    font-size: 10px;
    color: #aaa;
    pointer-events: none;
  }
  .black-key.active .key-label { color: #fff; }

  /* ---- STATUS BAR ---- */
  #status-bar {
    margin-top: 12px;
    font-size: 13px;
    color: #787878;
    text-align: center;
  }
  #api-status { display: inline-block; margin-left: 8px; }
  .status-ok  { color: #50DC8C; }
  .status-err { color: #ff5a5a; }

  #stop-btn {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: #ff5a5a;
    border: none;
    color: #f0f0f0;
    font-size: 14px;
    font-weight: bold;
    padding: 10px 24px;
    border-radius: 8px;
    cursor: pointer;
    z-index: 100;
  }
  #stop-btn:hover:not(:disabled) { background: #ff7a7a; }
  #stop-btn:disabled { background: #444; color: #666; cursor: default; }

  /* Engine selector */
  #engine-selector {
    display: flex;
    gap: 8px;
    margin-top: 10px;
    justify-content: center;
    align-items: center;
  }
  #engine-selector span { font-size: 13px; color: #787878; }
  .engine-btn {
    background: #282C34;
    border: 2px solid #444;
    color: #aaa;
    font-size: 13px;
    padding: 5px 14px;
    border-radius: 6px;
    cursor: pointer;
  }
  .engine-btn.active {
    border-color: #5AAEFF;
    color: #5AAEFF;
    background: #1a2535;
  }
  .engine-btn:hover { border-color: #5AAEFF; }
</style>
</head>
<body>

<div id="app">
  <div id="top-bar">
    <div id="metronome-area">
      <div id="tempo-row">
        <button class="tempo-btn" id="btn-minus">−</button>
        <span id="bpm-display">100 BPM</span>
        <button class="tempo-btn" id="btn-plus">+</button>
      </div>
      <div id="beat-dots">
        <div class="beat-dot" data-beat="1"></div>
        <div class="beat-dot" data-beat="2"></div>
        <div class="beat-dot" data-beat="3"></div>
        <div class="beat-dot" data-beat="4"></div>
      </div>
      <span id="range-label">Range C4–B5 &nbsp;(z / x to shift octave)</span>
    </div>

    <div id="chord-area">
      <div id="chord-label">Predicted Chord</div>
      <div id="chord-display">–</div>
    </div>
  </div>

  <div id="piano-container">
    <div id="piano"></div>
  </div>

  <div id="engine-selector">
    <span>Engine:</span>
    <button class="engine-btn active" data-engine="transformer">AR Transformer</button>
    <button class="engine-btn"        data-engine="crf">CRF</button>
  </div>

  <div id="status-bar">
    API: <span id="api-status" class="status-err">not connected</span>
    &nbsp;|&nbsp; Click anywhere on the piano to enable audio
  </div>
</div>

<button id="stop-btn" disabled>Stop</button>

<script>
// =============================================================
// CONSTANTS  (mirrors utils/constants.py)
// =============================================================

const NOTE_FREQS = {
  'C2':65.41,'C#2':69.30,'D2':73.42,'D#2':77.78,'E2':82.41,'F2':87.31,
  'F#2':92.50,'G2':98.00,'G#2':103.83,'A2':110.00,'A#2':116.54,'B2':123.47,
  'C3':130.81,'C#3':138.59,'D3':146.83,'D#3':155.56,'E3':164.81,'F3':174.61,
  'F#3':185.00,'G3':196.00,'G#3':207.65,'A3':220.00,'A#3':233.08,'B3':246.94,
  'C4':261.63,'C#4':277.18,'D4':293.66,'D#4':311.13,'E4':329.63,'F4':349.23,
  'F#4':369.99,'G4':392.00,'G#4':415.30,'A4':440.00,'A#4':466.16,'B4':493.88,
  'C5':523.25,'C#5':554.37,'D5':587.33,'D#5':622.25,'E5':659.25,'F5':698.46,
  'F#5':739.99,'G5':783.99,'G#5':830.61,'A5':880.00,'A#5':932.33,'B5':987.77,
  'C6':1046.50,'C#6':1108.73,'D6':1174.66,'D#6':1244.51,'E6':1318.51,
};

// Same mapping as Python KEYBOARD_MAP
const KEYBOARD_MAP = {
  'a':'C4','w':'C#4','s':'D4','e':'D#4','d':'E4',
  'f':'F4','t':'F#4','g':'G4','y':'G#4','h':'A4',
  'u':'A#4','j':'B4','k':'C5','o':'C#5','l':'D5',
  'p':'D#5',';':'E5',"'":'F5'
};

// Labels per key for first and second relative octave
const OCT1_LABELS = {C:'a','C#':'w',D:'s','D#':'e',E:'d',F:'f','F#':'t',G:'g','G#':'y',A:'h','A#':'u',B:'j'};
const OCT2_LABELS = {C:'k','C#':'o',D:'l','D#':'p',E:';',F:"'"};

const ROOTS = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const WHITE_NAMES = ['C','D','E','F','G','A','B'];
const BLACK_NAMES = ['C#','D#','','F#','G#','A#',''];

// Chord intervals
const CHORD_INTERVALS = { maj:[0,4,7], min:[0,3,7] };

const API_BASE = 'http://localhost:5001/api';

// =============================================================
// STATE
// =============================================================

let audioContext = null;
let tempo = 100;
let octaveOffset = 0;   // -2 to +1
let engineType = 'transformer';
const OCTAVE_MIN = -2, OCTAVE_MAX = 1;

let notesPressed = {};  // noteName -> { startTime, audioNodes }
let notesPlayed  = [];  // { note, start, end }
let predictedChord = '–';
let currentBeat = 1;    // 1–4

// Metronome scheduling
let nextBeatTime = 0;
let schedulerTimer = null;
const LOOKAHEAD_MS     = 25;
const SCHEDULE_AHEAD_S = 0.12;

// API connectivity
let apiOk = false;

// =============================================================
// AUDIO  (additive synthesis — mirrors SoundGenerator)
// =============================================================

function ensureAudio() {
  if (!audioContext) {
    audioContext = new (window.AudioContext || window.webkitAudioContext)();
    nextBeatTime = audioContext.currentTime + 0.1;
    scheduleBeats();
    resetEngineHistory();
    document.getElementById('stop-btn').disabled = false;
  }
  if (audioContext.state === 'suspended') audioContext.resume();
}

const HARMONIC_AMPS = [1.0, 0.8, 0.6, 0.4, 0.3, 0.2];
const AMP_SUM = HARMONIC_AMPS.reduce((a,b)=>a+b,0);

function startNote(noteName) {
  if (!audioContext) return;
  const freq = NOTE_FREQS[noteName];
  if (!freq) return;

  const playFreq = freq * 2; // same as Python: freq * 2
  const master = audioContext.createGain();
  const filter = audioContext.createBiquadFilter();
  filter.type = 'lowpass';
  filter.frequency.value = 3500;

  const oscs = HARMONIC_AMPS.map((amp, i) => {
    const osc = audioContext.createOscillator();
    const g   = audioContext.createGain();
    osc.type = 'sine';
    osc.frequency.value = playFreq * (i + 1);
    g.gain.value = amp / AMP_SUM * 0.35;
    osc.connect(g);
    g.connect(filter);
    osc.start();
    return osc;
  });

  filter.connect(master);
  master.connect(audioContext.destination);

  const t = audioContext.currentTime;
  master.gain.setValueAtTime(0, t);
  master.gain.linearRampToValueAtTime(1, t + 0.01);

  return { oscs, master };
}

function stopNote(audioNodes) {
  if (!audioNodes || !audioContext) return;
  const t = audioContext.currentTime;
  audioNodes.master.gain.setValueAtTime(audioNodes.master.gain.value, t);
  audioNodes.master.gain.linearRampToValueAtTime(0, t + 0.25);
  audioNodes.oscs.forEach(o => o.stop(t + 0.26));
}

// Metronome click
function playClick(time, strong) {
  if (!audioContext) return;
  const osc  = audioContext.createOscillator();
  const gain = audioContext.createGain();
  osc.connect(gain);
  gain.connect(audioContext.destination);
  osc.frequency.value = strong ? 1200 : 800;
  gain.gain.setValueAtTime(0.25, time);
  gain.gain.exponentialRampToValueAtTime(0.001, time + 0.04);
  osc.start(time);
  osc.stop(time + 0.05);
}

// Simple chord accompaniment pad
function playAccompanimentChord(chordName, beatTime, beatDuration) {
  if (!audioContext || !chordName || chordName === 'N' || chordName === '–') return;
  const parts = chordName.split(':');
  if (parts.length < 2) return;
  const [root, quality] = parts;
  const rootIdx = ROOTS.indexOf(root);
  if (rootIdx < 0) return;
  const intervals = CHORD_INTERVALS[quality === 'min' ? 'min' : 'maj'] || [0,4,7];
  const rootMidi = 36 + rootIdx; // C2 = 36

  // intervals.concat([12]).forEach((interval, i) => {
  //   const midi = rootMidi + interval;
  //   const freq = 440 * Math.pow(2, (midi - 69) / 12);
  //   const delay = i * 0.025; // slight arpeggio
  //   const t = beatTime + delay;

  //   const osc  = audioContext.createOscillator();
  //   const gain = audioContext.createGain();
  //   const filt = audioContext.createBiquadFilter();
  //   filt.type = 'lowpass';
  //   filt.frequency.value = 2000;
  //   osc.type = 'sine';
  //   osc.frequency.value = freq;
  //   osc.connect(filt);
  //   filt.connect(gain);
  //   gain.connect(audioContext.destination);
  //   gain.gain.setValueAtTime(0, t);
  //   gain.gain.linearRampToValueAtTime(1, t + 0.015);
  //   gain.gain.setValueAtTime(1, t + beatDuration * 0.7);
  //   gain.gain.linearRampToValueAtTime(0, t + beatDuration);
  //   osc.start(t);
  //   osc.stop(t + beatDuration + 0.1);
  // });
}

// =============================================================
// METRONOME  (Web Audio lookahead scheduler)
// =============================================================

function scheduleBeats() {
  if (!audioContext) return;

  while (nextBeatTime < audioContext.currentTime + SCHEDULE_AHEAD_S) {
    const beatTime  = nextBeatTime;
    const beat      = currentBeat;
    const strong    = beat === 1;
    const beatDur   = 60 / tempo;

    // Mute click when accompaniment is active (mirrors pygame metronome.mute(chord != "N"))
    if (predictedChord === '–' || predictedChord === 'N') {
      playClick(beatTime, strong);
    }

    // Trigger processing at beat time
    const msUntil = (beatTime - audioContext.currentTime) * 1000;
    setTimeout(() => onBeat(beat, beatTime, beatDur), Math.max(0, msUntil));

    nextBeatTime += beatDur;
    currentBeat = currentBeat % 4 + 1;
  }

  schedulerTimer = setTimeout(scheduleBeats, LOOKAHEAD_MS);
}

function onBeat(beat, beatTime, beatDur) {
  updateBeatDots(beat);

  // Collect notes played during the beat window [beatTime-beatDur, beatTime]
  // Use beatTime - beatDur as reference so step windows align with when notes were played
  const windowStart = beatTime - beatDur;
  const activeNotes = Object.entries(notesPressed).map(([note, data]) => ({
    note, start: data.startTime, end: beatTime
  }));
  const beatNotes = notesPlayed.concat(activeNotes);
  notesPlayed = [];

  predictChordFromAPI(beatNotes, windowStart, beat, beatDur);
}

async function predictChordFromAPI(notes, beatStart, beatIndex, beatDur) {
  try {
    const res = await fetch(`${API_BASE}/predict-chord`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        app: 'piano',
        engine_type: engineType,
        notes: notes.map(n => ({ note: n.note, start: n.start, end: n.end })),
        beat_start: beatStart,
        beat_index: beatIndex,
        tempo
      })
    });
    const data = await res.json();
    if (data.chord) {
      predictedChord = data.chord;
      document.getElementById('chord-display').textContent = data.chord;
      playAccompanimentChord(data.chord, audioContext ? audioContext.currentTime : 0, beatDur);
    }
  } catch (e) {
    // API not available — silent fallback
  }
}

// =============================================================
// PIANO KEYBOARD  (HTML/CSS rendering)
// =============================================================

function buildPiano() {
  const piano = document.getElementById('piano');
  piano.innerHTML = '';

  const oct1 = 4 + octaveOffset;
  const oct2 = oct1 + 1;

  // 14 white keys
  for (let i = 0; i < 14; i++) {
    const octave = i < 7 ? oct1 : oct2;
    const name   = WHITE_NAMES[i % 7];
    const note   = `${name}${octave}`;
    const labelMap = i < 7 ? OCT1_LABELS : OCT2_LABELS;
    const label  = labelMap[name] || '';

    const div = document.createElement('div');
    div.className = 'white-key';
    div.dataset.note = note;
    div.innerHTML = `<span class="key-label">${label}</span>`;
    div.addEventListener('mousedown', e => { e.preventDefault(); pressNote(note); });
    div.addEventListener('mouseup',   () => releaseNote(note));
    div.addEventListener('mouseleave',() => releaseNote(note));
    piano.appendChild(div);
  }

  // 10 black keys — positioned absolutely
  const totalWhite = 14;
  const whiteKeyPct = 100 / totalWhite;

  // [white-key index, note-name, oct-index (0=oct1,1=oct2)]
  const blackDefs = [
    [0,'C#',0],[1,'D#',0],[3,'F#',0],[4,'G#',0],[5,'A#',0],
    [7,'C#',1],[8,'D#',1],[10,'F#',1],[11,'G#',1],[12,'A#',1]
  ];

  blackDefs.forEach(([wIdx, name, octIdx]) => {
    const octave = octIdx === 0 ? oct1 : oct2;
    const note   = `${name}${octave}`;
    const labelMap = octIdx === 0 ? OCT1_LABELS : OCT2_LABELS;
    const label  = labelMap[name] || '';

    const div = document.createElement('div');
    div.className = 'black-key';
    div.dataset.note = note;
    div.style.left = `${(wIdx + 0.67) * whiteKeyPct}%`;
    div.innerHTML = `<span class="key-label">${label}</span>`;
    div.addEventListener('mousedown', e => { e.preventDefault(); pressNote(note); });
    div.addEventListener('mouseup',   () => releaseNote(note));
    div.addEventListener('mouseleave',() => releaseNote(note));
    piano.appendChild(div);
  });

  updateRangeLabel();
}

function updateRangeLabel() {
  const oct1 = 4 + octaveOffset;
  document.getElementById('range-label').textContent =
    `Range C${oct1}–B${oct1+1}   (z / x to shift octave)`;
}

function updateBeatDots(beat) {
  document.querySelectorAll('.beat-dot').forEach(dot => {
    dot.classList.toggle('active', parseInt(dot.dataset.beat) === beat);
  });
}

// =============================================================
// NOTE PRESS / RELEASE
// =============================================================

function pressNote(noteName) {
  ensureAudio();
  if (notesPressed[noteName]) return;
  const nodes = startNote(noteName);
  notesPressed[noteName] = { startTime: audioContext ? audioContext.currentTime : Date.now()/1000, audioNodes: nodes };
  document.querySelectorAll(`[data-note="${noteName}"]`).forEach(el => el.classList.add('active'));
}

function releaseNote(noteName) {
  const data = notesPressed[noteName];
  if (!data) return;
  stopNote(data.audioNodes);
  const end = audioContext ? audioContext.currentTime : Date.now()/1000;
  notesPlayed.push({ note: noteName, start: data.startTime, end });
  delete notesPressed[noteName];
  document.querySelectorAll(`[data-note="${noteName}"]`).forEach(el => el.classList.remove('active'));
}

// =============================================================
// KEYBOARD INPUT
// =============================================================

const keysDown = new Set();

function noteFromKey(key) {
  const baseNote = KEYBOARD_MAP[key];
  if (!baseNote) return null;
  const name   = baseNote.slice(0, -1);
  const octave = parseInt(baseNote.slice(-1)) + octaveOffset;
  const shifted = `${name}${octave}`;
  return NOTE_FREQS[shifted] ? shifted : null;
}

document.addEventListener('keydown', e => {
  if (e.repeat) return;
  const key = e.key;

  if (key === 'z') {
    octaveOffset = Math.max(OCTAVE_MIN, octaveOffset - 1);
    Object.keys(notesPressed).forEach(releaseNote);
    buildPiano();
    return;
  }
  if (key === 'x') {
    octaveOffset = Math.min(OCTAVE_MAX, octaveOffset + 1);
    Object.keys(notesPressed).forEach(releaseNote);
    buildPiano();
    return;
  }

  const note = noteFromKey(key);
  if (note && !keysDown.has(key)) {
    keysDown.add(key);
    pressNote(note);
  }
});

document.addEventListener('keyup', e => {
  keysDown.delete(e.key);
  const note = noteFromKey(e.key);
  if (note) releaseNote(note);
});

// =============================================================
// TEMPO CONTROLS
// =============================================================

function setTempo(bpm) {
  tempo = Math.max(20, Math.min(300, bpm));
  document.getElementById('bpm-display').textContent = `${tempo} BPM`;
}

document.getElementById('btn-plus' ).addEventListener('click', () => { ensureAudio(); setTempo(tempo + 5); });
document.getElementById('btn-minus').addEventListener('click', () => { ensureAudio(); setTempo(tempo - 5); });

// =============================================================
// API HEALTH CHECK
// =============================================================

async function checkAPI() {
  try {
    const res = await fetch(`${API_BASE}/health`);
    const d = await res.json();
    apiOk = d.status === 'ok';
  } catch (e) {
    apiOk = false;
  }
  const el = document.getElementById('api-status');
  el.textContent = apiOk ? 'connected' : 'not connected (chord prediction unavailable)';
  el.className   = apiOk ? 'status-ok' : 'status-err';
}

async function resetEngineHistory() {
  try {
    await fetch(`${API_BASE}/reset`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ app: 'piano', engine_type: engineType })
    });
  } catch (e) {}
}

// =============================================================
// ENGINE SELECTOR
// =============================================================

document.querySelectorAll('.engine-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    engineType = btn.dataset.engine;
    document.querySelectorAll('.engine-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    resetEngineHistory();
    notesPressed = {};
    notesPlayed  = [];
    predictedChord = '–';
    document.getElementById('chord-display').textContent = '–';
  });
});

// =============================================================
// INIT
// =============================================================

document.getElementById('stop-btn').addEventListener('click', () => location.reload());

buildPiano();
checkAPI();
setInterval(checkAPI, 5000);
</script>
</body>
</html>
